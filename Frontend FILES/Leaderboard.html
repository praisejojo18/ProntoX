<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ====== FIX: Prevent white flash on load ====== -->
    <script>
        (function() {
            if (localStorage.getItem('prontox-dark-mode') === 'true') {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProntoX · Leaderboard</title>

    <!-- Phosphor Icons -->
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />

    <style>
        /* ============================================================
           GLOBAL RESET & BASE (same as dashboard)
           ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #F0F4F8;
            --surface: #FFFFFF;
            --surface-2: #F8FAFC;
            --text-primary: #1A2332;
            --text-secondary: #475569;
            --text-muted: #94A3B8;
            --border: #E2E8F0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.08);

            --accent: #00AFEF;
            --accent-hover: #0099D3;
            --accent-dark: #0088CC;
            --accent-light: #E6F6FE;
            --accent-mid: #B3E5FC;

            --sidebar-bg: #FFFFFF;
            --sidebar-text: var(--text-primary);
            --sidebar-active: var(--accent);
            --sidebar-active-bg: var(--accent-light);
            --sidebar-hover-bg: rgba(0, 175, 239, 0.06);
            --sidebar-divider: var(--border);
            --sidebar-text-muted: var(--text-muted);

            --bg-dark: #0E0F11;
            --surface-dark: #1A1E21;
            --surface-2-dark: #24292E;
            --text-primary-dark: #E7E9EB;
            --text-secondary-dark: #AAB0B6;
            --text-muted-dark: #888E99;
            --border-dark: #353E46;
            --accent-dark-mode: #60A5FA;
            --accent-light-dark: #1a3a5a;

            --radius: 14px;
            --radius-sm: 10px;
            --radius-xs: 8px;
            --transition: 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-sidebar: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --sidebar-width: 260px;
        }

        body.dark-mode {
            --bg: var(--bg-dark);
            --surface: var(--surface-dark);
            --surface-2: var(--surface-2-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
            --text-muted: var(--text-muted-dark);
            --border: var(--border-dark);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.4);
            --accent: var(--accent-dark-mode);
            --accent-light: var(--accent-light-dark);
            --accent-mid: #1a4a5a;
            --sidebar-active: var(--accent-dark-mode);
            --sidebar-active-bg: var(--accent-light-dark);
            --sidebar-hover-bg: rgba(59, 130, 246, 0.06);

            --sidebar-bg: #1A1E21;
            --sidebar-divider: #353E46;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background var(--transition), color var(--transition);
        }

        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* ============================================================
           SIDEBAR (improved – matching dashboard)
           ============================================================ */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 0 16px 24px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 1000;
            transition: background var(--transition), transform var(--transition-sidebar),
                        width var(--transition-sidebar), color var(--transition);
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 0, 0, 0.08) transparent;
            border-right: 1px solid var(--sidebar-divider);
        }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.12); border-radius: 4px; }
        body.dark-mode .sidebar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); }

        .sidebar.collapsed {
            transform: translateX(calc(-1 * var(--sidebar-width)));
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 22px 12px 28px 12px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--sidebar-divider);
            margin-bottom: 16px;
        }

        .sidebar-header .brand-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-xs);
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-light);
            box-shadow: 0 4px 14px rgba(0, 175, 239, 0.15);
            transition: background var(--transition);
        }
        .sidebar-header .brand-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .sidebar-header .brand-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
            white-space: nowrap;
            transition: color var(--transition);
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 4px 0;
        }

        .sidebar-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            color: var(--sidebar-text-muted);
            font-size: 15px;
            font-weight: 500;
            transition: all var(--transition);
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            position: relative;
            white-space: nowrap;
        }

        .sidebar-nav .nav-item .ph { font-size: 22px; flex-shrink: 0; width: 24px; text-align: center; }
        .sidebar-nav .nav-item:hover { background: var(--sidebar-hover-bg); color: var(--text-primary); }
        .sidebar-nav .nav-item.active { background: var(--sidebar-active-bg); color: var(--sidebar-active); font-weight: 600; }
        .sidebar-nav .nav-item.active .ph { color: var(--sidebar-active); }

        .sidebar-divider {
            height: 1px;
            background: var(--sidebar-divider);
            margin: 10px 14px 12px;
            flex-shrink: 0;
            transition: background var(--transition);
        }

        .sidebar-nav .nav-item.logout {
            margin-top: auto;
            color: var(--text-muted);
        }
        .sidebar-nav .nav-item.logout:hover {
            background: rgba(239, 68, 68, 0.06);
            color: #ef4444;
        }

        .sidebar-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s ease;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        .sidebar-backdrop.visible { opacity: 1; visibility: visible; }

        /* ============================================================
           MAIN CONTENT
           ============================================================ */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin-left var(--transition-sidebar);
        }
        .main-content.expanded { margin-left: 0; }

        /* ============================================================
           TOP HEADER – compact (60px)
           ============================================================ */
        .top-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-shrink: 0;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.92);
            transition: background var(--transition), border-color var(--transition);
        }
        body.dark-mode .top-header { background: rgba(26, 30, 33, 0.92); }

        .top-header .left-section { display: flex; align-items: center; gap: 16px; }
        .top-header .hamburger-btn {
            background: transparent;
            border: none;
            font-size: 28px;
            color: var(--text-primary);
            cursor: pointer;
            padding: 6px;
            border-radius: var(--radius-xs);
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .top-header .hamburger-btn:hover { background: rgba(0, 0, 0, 0.04); }
        .top-header .hamburger-btn:active { transform: scale(0.92); }
        .top-header .brand-mobile {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            display: none;
            letter-spacing: -0.3px;
        }

        .top-header .search-wrap {
            flex: 1;
            max-width: 460px;
            position: relative;
        }
        .top-header .search-wrap .ph {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: var(--text-muted);
            transition: color var(--transition);
            pointer-events: none;
        }
        .top-header .search-wrap input {
            width: 100%;
            padding: 8px 16px 8px 48px;
            border: 1.5px solid var(--border);
            border-radius: 50px;
            font-size: 14px;
            background: var(--bg);
            color: var(--text-primary);
            transition: all var(--transition);
            outline: none;
            font-weight: 450;
        }
        .top-header .search-wrap input::placeholder { color: var(--text-muted); font-weight: 400; }
        .top-header .search-wrap input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0, 175, 239, 0.12);
            background: var(--surface);
        }
        .top-header .search-wrap input:focus ~ .ph { color: var(--accent); }

        .top-header .right-section { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }

        .top-header .profile-image-wrap {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color var(--transition), transform var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .top-header .profile-image-wrap:hover { border-color: var(--accent); transform: scale(1.04); }
        .top-header .profile-image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .top-header .user-name {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .dark-toggle {
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
            transition: color var(--transition), transform var(--transition);
            padding: 4px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            line-height: 1;
        }
        .dark-toggle:hover { color: var(--accent); transform: scale(1.1); }
        .dark-toggle:active { transform: scale(0.9); }

        /* ============================================================
           PAGE CONTENT – LEADERBOARD
           ============================================================ */
        .page-content {
            padding: 32px 40px 48px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .leaderboard-header {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 24px;
            width: 100%;
            max-width: 900px;
        }

        .leaderboard-header h1 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .leaderboard-header .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: 450;
        }

        /* ---- LEADERBOARD CARD (fits screen, no scroll) ---- */
        .leaderboard-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            padding: 20px 24px 16px;
            transition: all var(--transition);
            max-width: 900px;
            width: 100%;
        }
        .leaderboard-card:hover {
            box-shadow: var(--shadow-hover);
        }

        .leaderboard-card .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .leaderboard-card .card-header .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .leaderboard-card .card-header .live-badge {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--surface-2);
            padding: 2px 12px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        /* ---- CONTRIBUTOR LIST (no scroll, fits naturally) ---- */
        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
            width: 100%;
        }

        /* ===== CONTRIBUTOR ROW (identical to dashboard) ===== */
        .contributor-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 10px;
            border-radius: var(--radius-xs);
            border-bottom: 1px solid var(--border);
            transition: background var(--transition), transform var(--transition);
            cursor: default;
        }
        .contributor-item:last-child { border-bottom: none; }
        .contributor-item:hover {
            background: var(--surface-2);
            transform: translateX(3px);
        }

        .contributor-item .contrib-rank {
            font-weight: 700;
            font-size: 16px;
            min-width: 28px;
            text-align: center;
            flex-shrink: 0;
        }
        .contributor-item .contrib-rank.gold { color: #f59e0b; }
        .contributor-item .contrib-rank.silver { color: #94a3b8; }
        .contributor-item .contrib-rank.bronze { color: #cd7f32; }

        .contributor-item .contrib-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent-light);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
            flex-shrink: 0;
            overflow: hidden;
            border: 2px solid var(--border);
            transition: border-color var(--transition);
        }
        .contributor-item:hover .contrib-avatar {
            border-color: var(--accent);
        }
        .contributor-item .contrib-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .contributor-item .contrib-info {
            flex: 1;
            min-width: 0;
        }
        .contributor-item .contrib-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .contributor-item .contrib-name .you-tag {
            font-weight: 600;
            color: var(--accent);
            font-size: 11px;
            margin-left: 4px;
        }
        .contributor-item .contrib-role {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contributor-item .contrib-points {
            font-weight: 700;
            color: var(--accent);
            font-size: 14px;
            flex-shrink: 0;
            padding-left: 8px;
        }

        /* ---- RESPONSIVE ---- */
        @media (max-width: 900px) {
            .top-header { padding: 0 20px; }
            .page-content { padding: 24px 20px 36px; }
            .top-header .brand-mobile { display: block; }
            .top-header .left-section .brand-text { display: none; }
            .top-header .user-name { display: none; }
            .top-header .search-wrap { max-width: 280px; }
            .leaderboard-card { padding: 18px 16px; }
        }

        @media (max-width: 640px) {
            :root { --sidebar-width: 280px; }
            .top-header { padding: 0 14px; height: 52px; gap: 10px; }
            .top-header .search-wrap { max-width: 160px; }
            .top-header .search-wrap input { padding: 6px 10px 6px 34px; font-size: 13px; }
            .top-header .search-wrap .ph { font-size: 16px; left: 10px; }
            .top-header .hamburger-btn { font-size: 22px; padding: 4px; }
            .top-header .profile-image-wrap { width: 32px; height: 32px; }
            .dark-toggle { font-size: 20px; }
            .page-content { padding: 18px 14px 32px; }
            .leaderboard-header h1 { font-size: 24px; }
            .leaderboard-card { padding: 14px 12px; }
            .main-content { margin-left: 0 !important; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-backdrop.visible { opacity: 1; visibility: visible; }
            .top-header .brand-mobile { display: block; }
            .contributor-item .contrib-rank { font-size: 14px; min-width: 24px; }
            .contributor-item .contrib-avatar { width: 28px; height: 28px; font-size: 11px; }
            .contributor-item .contrib-name { font-size: 12px; }
            .contributor-item .contrib-role { font-size: 10px; }
            .contributor-item .contrib-points { font-size: 12px; }
            .contributor-item { padding: 4px 8px; gap: 8px; }
        }

        @media (max-width: 400px) {
            .top-header .search-wrap { max-width: 120px; }
            .top-header .search-wrap input { font-size: 12px; padding: 5px 8px 5px 28px; }
            .top-header .search-wrap .ph { font-size: 14px; left: 8px; }
        }
    </style>
</head>
<body>

    <!-- Sidebar backdrop -->
    <div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true"></div>

    <!-- SIDEBAR (improved – matching dashboard) -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
        <div class="sidebar-header">
            <div class="brand-icon">
                <img src="../Images/logo.png" alt="ProntoX Logo" />
            </div>
            <span class="brand-text">ProntoX</span>
        </div>
        <nav class="sidebar-nav">
            <button class="nav-item" data-nav="dashboard">
                <i class="ph ph-house" aria-hidden="true"></i>
                <span class="label">Dashboard</span>
            </button>
            <button class="nav-item" data-nav="ideas">
                <i class="ph ph-lightbulb" aria-hidden="true"></i>
                <span class="label">Ideas</span>
            </button>
            <button class="nav-item active" data-nav="leaderboard" aria-current="page">
                <i class="ph ph-trophy" aria-hidden="true"></i>
                <span class="label">Leaderboard</span>
            </button>
            <button class="nav-item" data-nav="rewards">
                <i class="ph ph-gift" aria-hidden="true"></i>
                <span class="label">Rewards</span>
            </button>
            <div class="sidebar-divider" role="separator"></div>
            <button class="nav-item" data-nav="profile">
                <i class="ph ph-user" aria-hidden="true"></i>
                <span class="label">Profile</span>
            </button>
            <button class="nav-item" data-nav="settings">
                <i class="ph ph-gear" aria-hidden="true"></i>
                <span class="label">Settings</span>
            </button>
            <button class="nav-item logout" data-nav="logout">
                <i class="ph ph-sign-out" aria-hidden="true"></i>
                <span class="label">Log out</span>
            </button>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-content" id="mainContent" role="main">

        <!-- TOP HEADER -->
        <header class="top-header" role="banner">
            <div class="left-section">
                <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle sidebar" aria-expanded="true">
                    <i class="ph ph-list" id="hamburgerIcon" aria-hidden="true"></i>
                </button>
                <span class="brand-mobile">ProntoX</span>
            </div>

            <div class="search-wrap" role="search">
                <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
                <input type="text" placeholder="Search..." id="searchInput" aria-label="Search" />
            </div>

            <div class="right-section">
                <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode">
                    <i class="ph ph-sun" id="darkIcon"></i>
                </button>

                <div class="profile-image-wrap" id="profileImageWrap" title="Go to Profile">
                    <i class="ph ph-user" id="headerAvatarIcon" style="font-size:24px; color:var(--accent);"></i>
                    <img src="" alt="Profile" id="profileImage" style="display:none;" />
                </div>
                <span class="user-name">John Doe</span>
            </div>
        </header>

        <!-- PAGE CONTENT -->
        <div class="page-content">

            <div class="leaderboard-header">
                <h1>Leaderboard</h1>
                <span class="subtitle">Top contributors – ranked by total points</span>
            </div>

            <div class="leaderboard-card">
                <div class="card-header">
                    <span class="card-title">🏆 Top Contributors</span>
                    <span class="live-badge" id="lastUpdated">● Live</span>
                </div>
                <div class="leaderboard-list" id="leaderboardList">
                    <!-- rendered by JS -->
                </div>
            </div>

        </div><!-- /page-content -->
    </div><!-- /main-content -->

    <script>
        (function() {
            'use strict';

            // ------------------------------------------------------------
            // CONSTANTS & SHARED DATA
            // ------------------------------------------------------------
            const CURRENT_USER = 'Chidi';
            const CONTRIBUTORS_KEY = 'prontox_contributors';
            const IDEAS_KEY = 'prontox_ideas';
            const ACTIVITY_KEY = 'prontox_activity';

            // Same fake names and roles as dashboard
            const FAKE_NAMES = [
                'Fatima Yusuf', 'Amina Bello', 'Oluwaseun A.', 'Emeka N.',
                'Zainab O.', 'Tunde A.', 'Chioma N.', 'Efe Paul',
                'Musa I.', 'Abubakar M.', 'Blessing E.', 'Funmi L.',
                'Idris A.', 'Joy O.', 'Michael T.'
            ];

            const ROLES = [
                'Product Designer', 'Product Manager', 'Software Engineer',
                'Data Scientist', 'UX Researcher', 'DevOps Lead',
                'Frontend Architect', 'Backend Engineer', 'QA Engineer',
                'Engineering Manager', 'Product Owner', 'Tech Lead',
                'Senior Developer', 'Cloud Architect', 'Security Analyst'
            ];

            // ------------------------------------------------------------
            // CONTRIBUTORS DATA STORE (shared with dashboard)
            // ------------------------------------------------------------
            function getContributors() {
                try {
                    const data = localStorage.getItem(CONTRIBUTORS_KEY);
                    if (data) {
                        const parsed = JSON.parse(data);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            return parsed;
                        }
                    }
                } catch (e) { /* ignore */ }

                // Generate default contributors with random points
                const defaultContributors = FAKE_NAMES.map(function(name, index) {
                    const isYou = (name === 'Chidi Okafor' || (index === 2 && name === 'Chidi Okafor'));
                    const basePoints = [5200, 3400, 1250, 1100, 950, 880, 790, 710, 650, 600, 580, 510, 490, 420, 380];
                    const pts = basePoints[index] || Math.floor(Math.random() * 5000) + 500;
                    return {
                        id: index + 1,
                        name: name,
                        role: ROLES[index % ROLES.length],
                        points: pts,
                        isYou: isYou
                    };
                });
                saveContributors(defaultContributors);
                return defaultContributors;
            }

            function saveContributors(contributors) {
                localStorage.setItem(CONTRIBUTORS_KEY, JSON.stringify(contributors));
            }

            // Sync contributors with ideas (recalculate points based on activity)
            function syncContributorsFromIdeas() {
                try {
                    const ideasData = localStorage.getItem(IDEAS_KEY);
                    if (!ideasData) return getContributors();
                    const ideas = JSON.parse(ideasData);

                    const contributors = getContributors();
                    // Reset points based on activity
                    const pointsMap = {};
                    ideas.forEach(function(idea) {
                        const creator = idea.createdBy || 'Unknown';
                        if (!pointsMap[creator]) pointsMap[creator] = 0;
                        if (idea.status === 'submitted') pointsMap[creator] += 10;
                        else if (idea.status === 'review') pointsMap[creator] += 20;
                        else if (idea.status === 'approved') pointsMap[creator] += 30;
                        else if (idea.status === 'implemented') pointsMap[creator] += 50;
                        // Upvotes also give points to the idea owner
                        if (idea.upvotes && idea.upvotes > 0) {
                            pointsMap[creator] += idea.upvotes * 2;
                        }
                    });

                    // Update contributor points
                    contributors.forEach(function(c) {
                        if (pointsMap[c.name]) {
                            c.points = pointsMap[c.name];
                        }
                    });

                    // If Chidi (current user) has no points but is in the list, give base
                    const chidi = contributors.find(function(c) { return c.name === CURRENT_USER; });
                    if (chidi && chidi.points === 0) {
                        chidi.points = 1250; // base points for current user
                    }

                    saveContributors(contributors);
                    return contributors;
                } catch (e) {
                    return getContributors();
                }
            }

            // ------------------------------------------------------------
            // RENDER LEADERBOARD – all 15 contributors, no scroll
            // ------------------------------------------------------------
            function renderLeaderboard() {
                const contributors = syncContributorsFromIdeas();

                // Sort by points descending
                const sorted = contributors.slice().sort(function(a, b) {
                    return b.points - a.points;
                });

                // Show ALL contributors (15)
                const allContributors = sorted;

                const listEl = document.getElementById('leaderboardList');

                if (allContributors.length === 0) {
                    listEl.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);">No contributors yet</div>';
                    return;
                }

                let html = '';
                allContributors.forEach(function(contrib, idx) {
                    const rank = idx + 1;
                    let rankClass = 'contrib-rank';
                    if (rank === 1) rankClass += ' gold';
                    else if (rank === 2) rankClass += ' silver';
                    else if (rank === 3) rankClass += ' bronze';

                    const initials = contrib.name.split(' ').map(function(w) { return w[0]; }).join('').toUpperCase().slice(
                        0, 2);
                    const isYou = contrib.isYou || (contrib.name === CURRENT_USER);

                    // Check if user has an avatar stored
                    let avatarHtml = '';
                    const avatarKey = 'prontox-avatar-' + contrib.id;
                    const savedAvatar = localStorage.getItem(avatarKey);
                    if (savedAvatar) {
                        avatarHtml = '<img src="' + savedAvatar + '" alt="' + contrib.name + '" />';
                    } else {
                        avatarHtml = initials;
                    }

                    html += '<div class="contributor-item">' +
                        '<span class="' + rankClass + '">' + rank + '</span>' +
                        '<div class="contrib-avatar">' + avatarHtml + '</div>' +
                        '<div class="contrib-info">' +
                        '<div class="contrib-name">' + contrib.name + (isYou ? ' <span class="you-tag">(You)</span>' : '') +
                        '</div>' +
                        '<div class="contrib-role">' + (contrib.role || ROLES[idx % ROLES.length]) + '</div>' +
                        '</div>' +
                        '<span class="contrib-points">' + contrib.points.toLocaleString() + ' pts</span>' +
                        '</div>';
                });

                listEl.innerHTML = html;
            }

            // ------------------------------------------------------------
            // LISTEN FOR CHANGES (cross-tab sync)
            // ------------------------------------------------------------
            window.addEventListener('storage', function(e) {
                if (e.key === CONTRIBUTORS_KEY || e.key === IDEAS_KEY || e.key === ACTIVITY_KEY) {
                    renderLeaderboard();
                }
            });

            // ------------------------------------------------------------
            // SIDEBAR & DARK MODE (same as dashboard)
            // ------------------------------------------------------------
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebarBackdrop');
            const hamburgerBtn = document.getElementById('hamburgerBtn');
            const hamburgerIcon = document.getElementById('hamburgerIcon');
            const mainContent = document.getElementById('mainContent');
            const searchInput = document.getElementById('searchInput');
            const navItems = document.querySelectorAll('.nav-item');
            const profileImageWrap = document.getElementById('profileImageWrap');
            const darkToggle = document.getElementById('darkToggle');
            const darkIcon = document.getElementById('darkIcon');

            let isSidebarOpen = true;
            let isMobile = window.innerWidth <= 640;

            function checkMobile() {
                isMobile = window.innerWidth <= 640;
                return isMobile;
            }

            function toggleSidebar(forceState) {
                const open = (typeof forceState === 'boolean') ? forceState : !isSidebarOpen;
                if (isMobile) {
                    if (open) {
                        sidebar.classList.add('open');
                        backdrop.classList.add('visible');
                        hamburgerBtn.setAttribute('aria-expanded', 'true');
                        hamburgerIcon.className = 'ph ph-x';
                    } else {
                        sidebar.classList.remove('open');
                        backdrop.classList.remove('visible');
                        hamburgerBtn.setAttribute('aria-expanded', 'false');
                        hamburgerIcon.className = 'ph ph-list';
                    }
                    isSidebarOpen = open;
                } else {
                    if (open) {
                        sidebar.classList.remove('collapsed');
                        mainContent.classList.remove('expanded');
                        hamburgerBtn.setAttribute('aria-expanded', 'true');
                        hamburgerIcon.className = 'ph ph-x';
                    } else {
                        sidebar.classList.add('collapsed');
                        mainContent.classList.add('expanded');
                        hamburgerBtn.setAttribute('aria-expanded', 'false');
                        hamburgerIcon.className = 'ph ph-list';
                    }
                    isSidebarOpen = open;
                }
            }

            function closeSidebarMobile() {
                if (isMobile) toggleSidebar(false);
            }

            navItems.forEach(function(item) {
                item.addEventListener('click', function(e) {
                    navItems.forEach(function(nav) {
                        nav.classList.remove('active');
                        nav.removeAttribute('aria-current');
                    });
                    this.classList.add('active');
                    this.setAttribute('aria-current', 'page');

                    const nav = this.dataset.nav;
                    if (nav === 'logout') {
                        e.preventDefault();
                        window.location.href = 'index.html';
                        return;
                    }
                    if (nav === 'dashboard') {
                        window.location.href = 'dashboard.html';
                        return;
                    }
                    if (nav === 'ideas') {
                        window.location.href = 'ideas.html';
                        return;
                    }
                    if (nav === 'leaderboard') {
                        closeSidebarMobile();
                        return;
                    }
                    if (nav === 'rewards') {
                        window.location.href = 'rewards.html';
                        return;
                    }
                    if (nav === 'profile') {
                        window.location.href = 'profile.html';
                        return;
                    }
                    if (nav === 'settings') {
                        window.location.href = 'settings.html';
                        return;
                    }
                    closeSidebarMobile();
                });
            });

            profileImageWrap.addEventListener('click', function() {
                window.location.href = 'profile.html';
            });

            hamburgerBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleSidebar();
            });

            backdrop.addEventListener('click', function() {
                if (isMobile) toggleSidebar(false);
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (isMobile && isSidebarOpen) toggleSidebar(false);
                    if (document.activeElement === searchInput) searchInput.blur();
                }
            });

            searchInput.addEventListener('focus', function() {
                this.closest('.search-wrap').classList.add('focused');
            });
            searchInput.addEventListener('blur', function() {
                this.closest('.search-wrap').classList.remove('focused');
            });

            // ---- Dark mode ----
            function applyDarkMode() {
                const darkMode = localStorage.getItem('prontox-dark-mode');
                if (darkMode === 'true') {
                    document.body.classList.add('dark-mode');
                    darkIcon.className = 'ph ph-moon';
                } else {
                    document.body.classList.remove('dark-mode');
                    darkIcon.className = 'ph ph-sun';
                }
            }

            darkToggle.addEventListener('click', function() {
                const isDark = document.body.classList.contains('dark-mode');
                if (isDark) {
                    document.body.classList.remove('dark-mode');
                    localStorage.setItem('prontox-dark-mode', 'false');
                    darkIcon.className = 'ph ph-sun';
                } else {
                    document.body.classList.add('dark-mode');
                    localStorage.setItem('prontox-dark-mode', 'true');
                    darkIcon.className = 'ph ph-moon';
                }
            });

            // ---- Avatar loading for header ----
            function loadAvatar() {
                const saved = localStorage.getItem('prontox-avatar');
                const headerImg = document.getElementById('profileImage');
                const headerIcon = document.getElementById('headerAvatarIcon');

                if (saved && headerImg) {
                    headerImg.src = saved;
                    headerImg.style.display = 'block';
                    if (headerIcon) headerIcon.style.display = 'none';
                } else {
                    if (headerImg) headerImg.style.display = 'none';
                    if (headerIcon) headerIcon.style.display = 'block';
                }
            }

            // ---- Resize ----
            let resizeTimer;

            function handleResize() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    const wasMobile = isMobile;
                    const nowMobile = checkMobile();

                    if (nowMobile && !wasMobile) {
                        if (isSidebarOpen) {
                            sidebar.classList.remove('collapsed');
                            mainContent.classList.remove('expanded');
                            toggleSidebar(false);
                        } else {
                            toggleSidebar(false);
                        }
                    } else if (!nowMobile && wasMobile) {
                        if (sidebar.classList.contains('open')) {
                            sidebar.classList.remove('open');
                            backdrop.classList.remove('visible');
                            toggleSidebar(true);
                        } else {
                            toggleSidebar(false);
                        }
                    }

                    if (!nowMobile) {
                        if (isSidebarOpen) {
                            sidebar.classList.remove('collapsed');
                            mainContent.classList.remove('expanded');
                            hamburgerBtn.setAttribute('aria-expanded', 'true');
                            hamburgerIcon.className = 'ph ph-x';
                        } else {
                            sidebar.classList.add('collapsed');
                            mainContent.classList.add('expanded');
                            hamburgerBtn.setAttribute('aria-expanded', 'false');
                            hamburgerIcon.className = 'ph ph-list';
                        }
                        sidebar.classList.remove('open');
                        backdrop.classList.remove('visible');
                    }
                }, 120);
            }

            window.addEventListener('resize', handleResize);

            // ---- INIT ----
            function init() {
                checkMobile();
                if (isMobile) toggleSidebar(false);
                else toggleSidebar(true);
                applyDarkMode();
                loadAvatar();
                renderLeaderboard();

                // Auto-refresh every 8 seconds (for multi-tab sync)
                setInterval(function() {
                    renderLeaderboard();
                }, 8000);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            // Listen for storage changes (avatar, dark mode)
            window.addEventListener('storage', function(e) {
                if (e.key === 'prontox-avatar') {
                    loadAvatar();
                }
                if (e.key === 'prontox-dark-mode') {
                    applyDarkMode();
                }
            });

        })();
    </script>

</body>
</html>
