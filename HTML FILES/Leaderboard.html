<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProntoX · Leaderboard</title>

    <!-- Phosphor Icons CDN -->
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />

    <style>
        /* ============================================================
                   GLOBAL RESET & BASE (same as dashboard)
                   ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Blue palette (dark → light) */
            --sidebar-bg: #172554;
            --sidebar-active: #93c5fd;
            --sidebar-active-bg: rgba(96, 165, 250, 0.15);
            --sidebar-hover-bg: rgba(147, 197, 253, 0.06);
            --sidebar-divider: rgba(147, 197, 253, 0.12);
            --sidebar-text: #b0aec8;

            --header-bg: #ffffff;
            --header-border: #edf2f7;
            --body-bg: #f6f8fc;
            --card-bg: #ffffff;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            --card-shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.08);

            --text-primary: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-muted: #8e8ea8;

            --radius: 14px;
            --radius-sm: 10px;
            --radius-xs: 8px;

            --transition: 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-sidebar: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);

            --sidebar-width: 260px;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--body-bg);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        :focus-visible {
            outline: 2px solid var(--sidebar-active);
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* ============================================================
                   SIDEBAR (exactly as dashboard)
                   ============================================================ */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 0 16px 24px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 1000;
            transition: transform var(--transition-sidebar), width var(--transition-sidebar);
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.08) transparent;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 4px;
        }

        .sidebar.collapsed {
            transform: translateX(calc(-1 * var(--sidebar-width)));
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 22px 12px 28px 12px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--sidebar-divider);
            margin-bottom: 16px;
        }

        .sidebar-header .brand-icon {
            width: 36px;
            height: 36px;
            background: #1e3a8a;
            border-radius: var(--radius-xs);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #bfdbfe;
            font-weight: 700;
            font-size: 18px;
            flex-shrink: 0;
        }

        .sidebar-header .brand-text {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.3px;
            white-space: nowrap;
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 4px 0;
        }

        .sidebar-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            color: var(--sidebar-text);
            font-size: 15px;
            font-weight: 500;
            transition: background var(--transition), color var(--transition);
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            position: relative;
            white-space: nowrap;
        }

        .sidebar-nav .nav-item .ph {
            font-size: 22px;
            flex-shrink: 0;
            width: 24px;
            text-align: center;
        }

        .sidebar-nav .nav-item:hover {
            background: var(--sidebar-hover-bg);
            color: #ffffff;
        }

        .sidebar-nav .nav-item.active {
            background: var(--sidebar-active-bg);
            color: var(--sidebar-active);
            font-weight: 600;
        }

        .sidebar-nav .nav-item.active .ph {
            color: var(--sidebar-active);
        }

        .sidebar-divider {
            height: 1px;
            background: var(--sidebar-divider);
            margin: 10px 14px 12px;
            flex-shrink: 0;
        }

        .sidebar-nav .nav-item.logout {
            margin-top: auto;
            color: #f87171;
        }

        .sidebar-nav .nav-item.logout:hover {
            background: rgba(248, 113, 113, 0.08);
            color: #fca5a5;
        }

        /* ============================================================
                   BACKDROP (mobile)
                   ============================================================ */
        .sidebar-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s ease;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        .sidebar-backdrop.visible {
            opacity: 1;
            visibility: visible;
        }

        /* ============================================================
                   MAIN CONTENT
                   ============================================================ */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin-left var(--transition-sidebar);
        }

        .main-content.expanded {
            margin-left: 0;
        }

        /* ============================================================
                   TOP HEADER
                   ============================================================ */
        .top-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--header-bg);
            border-bottom: 1px solid var(--header-border);
            padding: 0 32px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-shrink: 0;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.92);
        }

        .top-header .left-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .top-header .hamburger-btn {
            background: transparent;
            border: none;
            font-size: 28px;
            color: var(--text-primary);
            cursor: pointer;
            padding: 6px;
            border-radius: var(--radius-xs);
            transition: background var(--transition), transform var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .top-header .hamburger-btn:hover {
            background: rgba(0, 0, 0, 0.04);
        }
        .top-header .hamburger-btn:active {
            transform: scale(0.92);
        }

        .top-header .brand-mobile {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            display: none;
            letter-spacing: -0.3px;
        }

        .top-header .search-wrap {
            flex: 1;
            max-width: 460px;
            position: relative;
        }

        .top-header .search-wrap .ph {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: var(--text-muted);
            transition: color var(--transition);
            pointer-events: none;
        }

        .top-header .search-wrap input {
            width: 100%;
            padding: 10px 16px 10px 48px;
            border: 1.5px solid #e2e8f0;
            border-radius: 50px;
            font-size: 15px;
            background: #f7fafc;
            color: var(--text-primary);
            transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
            outline: none;
            font-weight: 450;
        }

        .top-header .search-wrap input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        .top-header .search-wrap input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
            background: #ffffff;
        }

        .top-header .search-wrap input:focus~.ph {
            color: #3b82f6;
        }

        .top-header .right-section {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .top-header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
            user-select: none;
        }

        .top-header .user-name {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
        }

        /* ============================================================
                   PAGE CONTENT – LEADERBOARD
                   ============================================================ */
        .page-content {
            padding: 32px 40px 48px;
            flex: 1;
        }

        .leaderboard-header {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 32px;
        }

        .leaderboard-header h1 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .leaderboard-header .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: 450;
        }

        /* ============================================================
                   TABLE CARD
                   ============================================================ */
        .table-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            padding: 24px 28px 28px;
            border: 1px solid rgba(0, 0, 0, 0.02);
            transition: box-shadow var(--transition), transform var(--transition);
        }

        .table-card:hover {
            box-shadow: var(--card-shadow-hover);
            transform: translateY(-2px);
        }

        .table-card .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        .leaderboard-table thead th {
            text-align: left;
            padding: 14px 12px 14px 0;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #edf2f7;
        }

        .leaderboard-table thead th:first-child {
            padding-left: 0;
        }
        .leaderboard-table thead th:last-child {
            padding-right: 0;
            text-align: right;
        }

        .leaderboard-table tbody td {
            padding: 16px 12px 16px 0;
            border-bottom: 1px solid #f0f2f5;
            vertical-align: middle;
        }

        .leaderboard-table tbody td:first-child {
            padding-left: 0;
        }
        .leaderboard-table tbody td:last-child {
            padding-right: 0;
            text-align: right;
        }

        .leaderboard-table tbody tr:last-child td {
            border-bottom: none;
        }

        /* Rank column */
        .rank-cell {
            font-weight: 700;
            color: var(--text-muted);
            font-size: 16px;
            width: 50px;
        }

        /* Staff member cell with avatar */
        .staff-cell {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .staff-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
            text-transform: uppercase;
        }

        .staff-info {
            display: flex;
            flex-direction: column;
        }

        .staff-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .staff-dept {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Ideas & Implemented numbers */
        .num-cell {
            font-weight: 500;
            color: var(--text-primary);
        }

        .points-cell {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 16px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .top-header {
                padding: 0 20px;
            }
            .page-content {
                padding: 24px 20px 36px;
            }
            .top-header .brand-mobile {
                display: block;
            }
            .top-header .left-section .brand-text {
                display: none;
            }
            .top-header .user-name {
                display: none;
            }
            .top-header .search-wrap {
                max-width: 300px;
            }
        }

        @media (max-width: 640px) {
            :root {
                --sidebar-width: 280px;
            }
            .top-header {
                padding: 0 14px;
                height: 64px;
                gap: 12px;
            }
            .top-header .search-wrap {
                max-width: 180px;
            }
            .top-header .search-wrap input {
                padding: 8px 12px 8px 40px;
                font-size: 14px;
            }
            .top-header .search-wrap .ph {
                font-size: 18px;
                left: 12px;
            }
            .top-header .hamburger-btn {
                font-size: 24px;
                padding: 4px;
            }
            .top-header .avatar {
                width: 34px;
                height: 34px;
                font-size: 14px;
            }
            .page-content {
                padding: 18px 14px 32px;
            }
            .leaderboard-header h1 {
                font-size: 24px;
            }
            .table-card {
                padding: 18px 14px 20px;
            }
            .leaderboard-table {
                font-size: 14px;
            }
            .staff-avatar {
                width: 34px;
                height: 34px;
                font-size: 12px;
            }
            .staff-name {
                font-size: 14px;
            }
            .staff-dept {
                font-size: 12px;
            }
            .rank-cell {
                font-size: 14px;
                width: 36px;
            }
            .points-cell {
                font-size: 14px;
            }
            .main-content {
                margin-left: 0 !important;
            }
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-backdrop.visible {
                opacity: 1;
                visibility: visible;
            }
            .top-header .brand-mobile {
                display: block;
            }
        }

        @media (max-width: 400px) {
            .top-header .search-wrap {
                max-width: 120px;
            }
            .top-header .search-wrap input {
                font-size: 13px;
                padding: 6px 10px 6px 34px;
            }
            .top-header .search-wrap .ph {
                font-size: 16px;
                left: 10px;
            }
        }
    </style>
</head>

<body>

    <!-- ============================================================
    SIDEBAR BACKDROP (mobile)
    ============================================================ -->
    <div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true"></div>

    <!-- ============================================================
    SIDEBAR
    ============================================================ -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
        <div class="sidebar-header">
            <div class="brand-icon" aria-hidden="true">P</div>
            <span class="brand-text">ProntoX</span>
        </div>

        <nav class="sidebar-nav">
            <!-- Dashboard (inactive) -->
            <button class="nav-item" data-nav="dashboard">
                <i class="ph ph-house" aria-hidden="true"></i>
                <span class="label">Dashboard</span>
            </button>

            <!-- Ideas -->
            <button class="nav-item" data-nav="ideas">
                <i class="ph ph-lightbulb" aria-hidden="true"></i>
                <span class="label">Ideas</span>
            </button>

            <!-- Leaderboard (active) -->
            <button class="nav-item active" data-nav="leaderboard" aria-current="page">
                <i class="ph ph-trophy" aria-hidden="true"></i>
                <span class="label">Leaderboard</span>
            </button>

            <!-- Rewards -->
            <button class="nav-item" data-nav="rewards">
                <i class="ph ph-gift" aria-hidden="true"></i>
                <span class="label">Rewards</span>
            </button>

            <!-- Builders Hub -->
            <button class="nav-item" data-nav="builders">
                <i class="ph ph-users" aria-hidden="true"></i>
                <span class="label">Builders Hub</span>
            </button>

            <div class="sidebar-divider" role="separator"></div>

            <!-- Profile -->
            <button class="nav-item" data-nav="profile">
                <i class="ph ph-user" aria-hidden="true"></i>
                <span class="label">Profile</span>
            </button>

            <!-- Settings -->
            <button class="nav-item" data-nav="settings">
                <i class="ph ph-gear" aria-hidden="true"></i>
                <span class="label">Settings</span>
            </button>

            <!-- Logout -->
            <button class="nav-item logout" data-nav="logout">
                <i class="ph ph-sign-out" aria-hidden="true"></i>
                <span class="label">Log out</span>
            </button>
        </nav>
    </aside>

    <!-- ============================================================
    MAIN CONTENT
    ============================================================ -->
    <div class="main-content" id="mainContent" role="main">

        <!-- ============================================================
        TOP HEADER
        ============================================================ -->
        <header class="top-header" role="banner">
            <div class="left-section">
                <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle sidebar" aria-expanded="true">
                    <i class="ph ph-list" aria-hidden="true"></i>
                </button>
                <span class="brand-mobile">ProntoX</span>
            </div>

            <div class="search-wrap" role="search">
                <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
                <input type="text" placeholder="Search ideas..." id="searchInput" aria-label="Search ideas" />
            </div>

            <div class="right-section">
                <div class="avatar" aria-hidden="true">JD</div>
                <span class="user-name">John Doe</span>
            </div>
        </header>

        <!-- ============================================================
        PAGE CONTENT – LEADERBOARD
        ============================================================ -->
        <div class="page-content">

            <div class="leaderboard-header">
                <h1>Leaderboard</h1>
                <span class="subtitle">Top contributors this quarter</span>
            </div>

            <div class="table-card">
                <div class="table-wrap">
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Staff Member</th>
                                <th>Ideas</th>
                                <th>Implemented</th>
                                <th>Points</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Row 1 -->
                            <tr>
                                <td class="rank-cell">1</td>
                                <td>
                                    <div class="staff-cell">
                                        <div class="staff-avatar">AR</div>
                                        <div class="staff-info">
                                            <span class="staff-name">Amanda R.</span>
                                            <span class="staff-dept">HR</span>
                                        </div>
                                    </div>
                                </td>
                                <td class="num-cell">8</td>
                                <td class="num-cell">5</td>
                                <td class="points-cell">3,450</td>
                            </tr>
                            <!-- Row 2 -->
                            <tr>
                                <td class="rank-cell">2</td>
                                <td>
                                    <div class="staff-cell">
                                        <div class="staff-avatar">DL</div>
                                        <div class="staff-info">
                                            <span class="staff-name">David L.</span>
                                            <span class="staff-dept">IT</span>
                                        </div>
                                    </div>
                                </td>
                                <td class="num-cell">12</td>
                                <td class="num-cell">8</td>
                                <td class="points-cell">2,800</td>
                            </tr>
                            <!-- Row 3 -->
                            <tr>
                                <td class="rank-cell">3</td>
                                <td>
                                    <div class="staff-cell">
                                        <div class="staff-avatar">CP</div>
                                        <div class="staff-info">
                                            <span class="staff-name">Chris P.</span>
                                            <span class="staff-dept">Ops</span>
                                        </div>
                                    </div>
                                </td>
                                <td class="num-cell">15</td>
                                <td class="num-cell">10</td>
                                <td class="points-cell">2,100</td>
                            </tr>
                            <!-- Row 4 -->
                            <tr>
                                <td class="rank-cell">4</td>
                                <td>
                                    <div class="staff-cell">
                                        <div class="staff-avatar">LM</div>
                                        <div class="staff-info">
                                            <span class="staff-name">Lisa M.</span>
                                            <span class="staff-dept">Finance</span>
                                        </div>
                                    </div>
                                </td>
                                <td class="num-cell">6</td>
                                <td class="num-cell">4</td>
                                <td class="points-cell">1,850</td>
                            </tr>
                            <!-- Row 5 -->
                            <tr>
                                <td class="rank-cell">5</td>
                                <td>
                                    <div class="staff-cell">
                                        <div class="staff-avatar">AJ</div>
                                        <div class="staff-info">
                                            <span class="staff-name">Alex Johnson</span>
                                            <span class="staff-dept">Engineering</span>
                                        </div>
                                    </div>
                                </td>
                                <td class="num-cell">9</td>
                                <td class="num-cell">6</td>
                                <td class="points-cell">1,200</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div><!-- /page-content -->
    </div><!-- /main-content -->


    <!-- ============================================================
    JAVASCRIPT (same interactivity as dashboard)
    ============================================================ -->
    <script>
        (function() {
            'use strict';

            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebarBackdrop');
            const hamburgerBtn = document.getElementById('hamburgerBtn');
            const mainContent = document.getElementById('mainContent');
            const searchInput = document.getElementById('searchInput');
            const navItems = document.querySelectorAll('.nav-item');

            let isSidebarOpen = true;
            let isMobile = window.innerWidth <= 640;

            function checkMobile() {
                isMobile = window.innerWidth <= 640;
                return isMobile;
            }

            function toggleSidebar(forceState) {
                const open = (typeof forceState === 'boolean') ? forceState : !isSidebarOpen;
                if (isMobile) {
                    if (open) {
                        sidebar.classList.add('open');
                        backdrop.classList.add('visible');
                        hamburgerBtn.setAttribute('aria-expanded', 'true');
                    } else {
                        sidebar.classList.remove('open');
                        backdrop.classList.remove('visible');
                        hamburgerBtn.setAttribute('aria-expanded', 'false');
                    }
                    isSidebarOpen = open;
                } else {
                    if (open) {
                        sidebar.classList.remove('collapsed');
                        mainContent.classList.remove('expanded');
                        hamburgerBtn.setAttribute('aria-expanded', 'true');
                    } else {
                        sidebar.classList.add('collapsed');
                        mainContent.classList.add('expanded');
                        hamburgerBtn.setAttribute('aria-expanded', 'false');
                    }
                    isSidebarOpen = open;
                }
            }

            function closeSidebarMobile() {
                if (isMobile) toggleSidebar(false);
            }

            // Navigation clicks
            navItems.forEach(function(item) {
                item.addEventListener('click', function(e) {
                    navItems.forEach(function(nav) {
                        nav.classList.remove('active');
                        nav.removeAttribute('aria-current');
                    });
                    this.classList.add('active');
                    this.setAttribute('aria-current', 'page');

                    if (this.dataset.nav === 'logout') {
                        e.preventDefault();
                        const label = this.querySelector('.label');
                        if (label) {
                            const original = label.textContent;
                            label.textContent = 'Logging out…';
                            setTimeout(function() { label.textContent = original; }, 800);
                        }
                        closeSidebarMobile();
                        return;
                    }

                    // Redirect to dashboard if clicked on dashboard
                    if (this.dataset.nav === 'dashboard') {
                        window.location.href = 'dashboard.html'; // placeholder – you can adjust
                    }

                    closeSidebarMobile();
                    console.log('Navigated to: ' + this.dataset.nav);
                });
            });

            // Hamburger
            hamburgerBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleSidebar();
            });

            // Backdrop
            backdrop.addEventListener('click', function() {
                if (isMobile) toggleSidebar(false);
            });

            // Escape
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (isMobile && isSidebarOpen) toggleSidebar(false);
                    if (document.activeElement === searchInput) searchInput.blur();
                }
            });

            // Search focus
            searchInput.addEventListener('focus', function() {
                this.closest('.search-wrap').classList.add('focused');
            });
            searchInput.addEventListener('blur', function() {
                this.closest('.search-wrap').classList.remove('focused');
            });

            // Resize handler
            let resizeTimer;

            function handleResize() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    const wasMobile = isMobile;
                    const nowMobile = checkMobile();

                    if (nowMobile && !wasMobile) {
                        if (isSidebarOpen) {
                            sidebar.classList.remove('collapsed');
                            mainContent.classList.remove('expanded');
                            toggleSidebar(false);
                        } else {
                            toggleSidebar(false);
                        }
                    } else if (!nowMobile && wasMobile) {
                        if (sidebar.classList.contains('open')) {
                            sidebar.classList.remove('open');
                            backdrop.classList.remove('visible');
                            toggleSidebar(true);
                        } else {
                            toggleSidebar(false);
                        }
                    }

                    if (!nowMobile) {
                        if (isSidebarOpen) {
                            sidebar.classList.remove('collapsed');
                            mainContent.classList.remove('expanded');
                            hamburgerBtn.setAttribute('aria-expanded', 'true');
                        } else {
                            sidebar.classList.add('collapsed');
                            mainContent.classList.add('expanded');
                            hamburgerBtn.setAttribute('aria-expanded', 'false');
                        }
                        sidebar.classList.remove('open');
                        backdrop.classList.remove('visible');
                    }
                }, 120);
            }

            window.addEventListener('resize', handleResize);

            // Init
            function init() {
                checkMobile();
                if (isMobile) toggleSidebar(false);
                else toggleSidebar(true);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
