<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IdeaHub — Sign in</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #121212;
      --card: #1c1c1c;
      --border: #2c2c2c;
      --accent: #EF9F27;
      --text: #f5f5f5;
      --muted: #9a9a9a;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .brand span { font-size: 1.5rem; }
    .brand h1 { font-size: 1.5rem; font-weight: 700; }
    .brand h1 b { color: var(--accent); }
    h2 { font-size: 1.25rem; margin-bottom: 0.25rem; }
    .subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.5rem; }
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .btn {
      width: 100%;
      padding: 0.8rem;
      background: var(--accent);
      color: #121212;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .switch { text-align: center; margin-top: 1.25rem; font-size: 0.875rem; color: var(--muted); }
    .switch a { color: var(--accent); text-decoration: none; cursor: pointer; font-weight: 500; }
    .switch a:hover { text-decoration: underline; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <span>💡</span>
      <h1>Idea<b>Hub</b></h1>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm">
      <h2>Welcome back</h2>
      <p class="subtitle">Log in to share and vote on ideas.</p>
      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@company.com" required />
      </div>
      <div class="field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn">Log in</button>
      <p class="switch">Don't have an account? <a id="showSignup">Sign up</a></p>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signupForm" class="hidden">
      <h2>Create your account</h2>
      <p class="subtitle">Join IdeaHub in seconds.</p>
      <div class="field">
        <label for="signupName">Full name</label>
        <input type="text" id="signupName" placeholder="Jane Doe" required />
      </div>
      <div class="field">
        <label for="signupEmail">Email</label>
        <input type="email" id="signupEmail" placeholder="you@company.com" required />
      </div>
      <div class="field">
        <label for="signupPassword">Password</label>
        <input type="password" id="signupPassword" placeholder="••••••••" required />
      </div>
      <div class="field">
        <label for="signupConfirm">Confirm password</label>
        <input type="password" id="signupConfirm" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn">Sign up</button>
      <p class="switch">Already have an account? <a id="showLogin">Log in</a></p>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');

    document.getElementById('showSignup').addEventListener('click', () => {
      loginForm.classList.add('hidden');
      signupForm.classList.remove('hidden');
    });

    document.getElementById('showLogin').addEventListener('click', () => {
      signupForm.classList.add('hidden');
      loginForm.classList.remove('hidden');
    });

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Logging in...');
    });

    signupForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const pw = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;
      if (pw !== confirm) {
        alert('Passwords do not match.');
        return;
      }
      alert('Account created!');
    });
  </script>
</body>
</html>
