    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IdeaHub</title>
  <style>
    :root {
      --bg: #121212;
      --surface: #1e1e1e;
      --surface-2: #2a2a2a;
      --accent: #EF9F27;
      --accent-hover: #d98c1a;
      --text: #f5f5f5;
      --muted: #9a9a9a;
      --border: #333333;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      line-height: 1.5;
    }

    .card {
      background-color: var(--surface);
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .brand h1 span {
      color: var(--accent);
    }

    .brand p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.35rem;
    }

    .form-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }

    .field {
      margin-bottom: 1.1rem;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }

    .field input {
      width: 100%;
      background-color: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 0.9rem;
      color: var(--text);
      font-size: 0.95rem;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .field input::placeholder {
      color: #6e6e6e;
    }

    .field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(239, 159, 39, 0.15);
    }

    .btn {
      width: 100%;
      background-color: var(--accent);
      color: #1a1300;
      border: none;
      border-radius: 10px;
      padding: 0.85rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background-color 0.15s ease;
    }

    .btn:hover {
      background-color: var(--accent-hover);
    }

    .switch {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: var(--muted);
    }

    .switch a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }

    .switch a:hover {
      text-decoration: underline;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <h1>Idea<span>Hub</span></h1>
      <p>Capture, organize, and grow your ideas</p>
    </div>

    <!-- Login Form -->
    <form id="login-form" autocomplete="off">
      <h2 class="form-title">Log in</h2>
      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" required />
      </div>
      <button type="submit" class="btn">Log in</button>
      <p class="switch">Don't have an account? <a id="show-signup">Sign up</a></p>
    </form>

    <!-- Signup Form -->
    <form id="signup-form" class="hidden" autocomplete="off">
      <h2 class="form-title">Create account</h2>
      <div class="field">
        <label for="signup-name">Name</label>
        <input type="text" id="signup-name" placeholder="Your full name" required />
      </div>
      <div class="field">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" placeholder="Create a password" required />
      </div>
      <div class="field">
        <label for="signup-confirm">Confirm password</label>
        <input type="password" id="signup-confirm" placeholder="Re-enter your password" required />
      </div>
      <button type="submit" class="btn">Sign up</button>
      <p class="switch">Already have an account? <a id="show-login">Log in</a></p>
    </form>
  </main>

  <script>
    var loginForm = document.getElementById("login-form");
    var signupForm = document.getElementById("signup-form");
    var showSignup = document.getElementById("show-signup");
    var showLogin = document.getElementById("show-login");

    showSignup.addEventListener("click", function () {
      loginForm.classList.add("hidden");
      signupForm.classList.remove("hidden");
    });

    showLogin.addEventListener("click", function () {
      signupForm.classList.add("hidden");
      loginForm.classList.remove("hidden");
    });

    loginForm.addEventListener("submit", function (e) {
      e.preventDefault();
      alert("Logged in successfully!");
    });

    signupForm.addEventListener("submit", function (e) {
      e.preventDefault();
      var password = document.getElementById("signup-password").value;
      var confirm = document.getElementById("signup-confirm").value;
      if (password !== confirm) {
        alert("Passwords do not match.");
        return;
      }
      alert("Account created successfully!");
    });
  </script>
</body>
</html>
</body>
</html>
