<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypie Style Rolling & Breathing Preloader</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0e; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Outer preloader container */
        .preloader-container {
            position: relative;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Thinner rolling outer ring matching your color palette */
        .rolling-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #00AFEF, #0099D3, #007CB0, transparent 65%);
            animation: roll 1.4s linear infinite;
            /* Mask made significantly tighter (95% to 97%) to create a thin line */
            mask: radial-gradient(farthest-side, transparent 95%, black 97%);
            -webkit-mask: radial-gradient(farthest-side, transparent 95%, black 97%);
        }

        /* Central logo container with breathing/pulsing animation */
        .logo-box {
            position: absolute;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            /* Smooth breathing animation */
            animation: breathe 2.5s ease-in-out infinite;
        }

        /* Replaceable Logo Image Styling */
        .logo-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Fallback placeholder text style if no image is present */
        .logo-placeholder {
            color: #00AFEF;
            font-weight: bold;
            font-size: 1.6rem;
            letter-spacing: 1px;
        }

        /* 1. Infinite rolling animation */
        @keyframes roll {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* 2. Smooth breathing/pulsing animation */
        @keyframes breathe {
            0%, 100% {
                transform: scale(0.92);
                opacity: 0.85;
            }
            50% {
                transform: scale(1.05);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="preloader-container">
        <div class="rolling-ring"></div>
        
        <div class="logo-box">
            <img src="../Images/logo.png" alt="Logo">
        </div>
    </div>

</body>
</html>
