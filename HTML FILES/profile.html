<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProntoX · Profile</title>

    <!-- Phosphor Icons CDN -->
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />

    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f6f8fc;
            --surface: #ffffff;
            --surface-2: #f8fafc;
            --text-primary: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-muted: #8e8ea8;
            --border: #edf2f7;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.08);

            --bg-dark: #0E0F11;
            --surface-dark: #1A1E21;
            --surface-2-dark: #24292E;
            --text-primary-dark: #E7E9EB;
            --text-secondary-dark: #AAB0B6;
            --text-muted-dark: #888E99;
            --border-dark: #353E46;

            --sidebar-bg: #172554;
            --sidebar-active: #93c5fd;
            --sidebar-active-bg: rgba(96, 165, 250, 0.15);
            --sidebar-hover-bg: rgba(147, 197, 253, 0.06);
            --sidebar-divider: rgba(147, 197, 253, 0.12);
            --sidebar-text: #b0aec8;

            --radius: 14px;
            --radius-sm: 10px;
            --radius-xs: 8px;
            --transition: 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-sidebar: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --sidebar-width: 260px;
        }

        body.dark-mode {
            --bg: var(--bg-dark);
            --surface: var(--surface-dark);
            --surface-2: var(--surface-2-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
            --text-muted: var(--text-muted-dark);
            --border: var(--border-dark);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        html { font-size: 16px; -webkit-font-smoothing: antialiased; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background var(--transition), color var(--transition);
        }

        :focus-visible { outline: 2px solid var(--sidebar-active); outline-offset: 2px; border-radius: 4px; }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 0 16px 24px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 1000;
            transition: transform var(--transition-sidebar), width var(--transition-sidebar);
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.08) transparent;
        }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 4px; }

        .sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-width))); }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 22px 12px 28px 12px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--sidebar-divider);
            margin-bottom: 16px;
        }

        .sidebar-header .brand-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-xs);
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e3a8a;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.2);
        }

        .sidebar-header .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .sidebar-header .brand-text {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.3px;
            white-space: nowrap;
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 4px 0;
        }

        .sidebar-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            color: var(--sidebar-text);
            font-size: 15px;
            font-weight: 500;
            transition: background var(--transition), color var(--transition);
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            position: relative;
            white-space: nowrap;
        }

        .sidebar-nav .nav-item .ph { font-size: 22px; flex-shrink: 0; width: 24px; text-align: center; }
        .sidebar-nav .nav-item:hover { background: var(--sidebar-hover-bg); color: #ffffff; }
        .sidebar-nav .nav-item.active { background: var(--sidebar-active-bg); color: var(--sidebar-active); font-weight: 600; }
        .sidebar-nav .nav-item.active .ph { color: var(--sidebar-active); }
        .sidebar-divider { height: 1px; background: var(--sidebar-divider); margin: 10px 14px 12px; flex-shrink: 0; }
        .sidebar-nav .nav-item.logout { margin-top: auto; color: #f87171; }
        .sidebar-nav .nav-item.logout:hover { background: rgba(248, 113, 113, 0.08); color: #fca5a5; }

        .sidebar-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s ease;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        .sidebar-backdrop.visible { opacity: 1; visibility: visible; }

        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin-left var(--transition-sidebar);
        }
        .main-content.expanded { margin-left: 0; }

        .top-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-shrink: 0;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.92);
            transition: background var(--transition), border-color var(--transition);
        }

        body.dark-mode .top-header { background: rgba(26, 30, 33, 0.92); }

        .top-header .left-section { display: flex; align-items: center; gap: 16px; }

        .top-header .hamburger-btn {
            background: transparent;
            border: none;
            font-size: 28px;
            color: var(--text-primary);
            cursor: pointer;
            padding: 6px;
            border-radius: var(--radius-xs);
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .top-header .hamburger-btn:hover { background: rgba(0, 0, 0, 0.04); }
        .top-header .hamburger-btn:active { transform: scale(0.92); }

        .top-header .brand-mobile {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            display: none;
            letter-spacing: -0.3px;
        }

        .top-header .search-wrap {
            flex: 1;
            max-width: 460px;
            position: relative;
        }

        .top-header .search-wrap .ph {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: var(--text-muted);
            transition: color var(--transition);
            pointer-events: none;
        }

        .top-header .search-wrap input {
            width: 100%;
            padding: 10px 16px 10px 48px;
            border: 1.5px solid var(--border);
            border-radius: 50px;
            font-size: 15px;
            background: var(--bg);
            color: var(--text-primary);
            transition: all var(--transition);
            outline: none;
            font-weight: 450;
        }

        .top-header .search-wrap input::placeholder { color: var(--text-muted); font-weight: 400; }

        .top-header .search-wrap input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
            background: var(--surface);
        }
        .top-header .search-wrap input:focus~.ph { color: #3b82f6; }

        .top-header .right-section { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }

        .top-header .profile-image-wrap {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color var(--transition), transform var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .top-header .profile-image-wrap:hover { border-color: #3b82f6; transform: scale(1.04); }
        .top-header .profile-image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .top-header .user-name {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .page-content {
            padding: 32px 40px 48px;
            flex: 1;
        }

        .profile-header {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 28px;
        }

        .profile-header h1 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .profile-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px 36px 36px;
            border: 1px solid var(--border);
            transition: all var(--transition);
            max-width: 820px;
        }

        .profile-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .profile-top {
            display: flex;
            align-items: center;
            gap: 28px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 36px;
            flex-shrink: 0;
            user-select: none;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.25);
        }

        .profile-info {
            flex: 1;
            min-width: 200px;
        }

        .profile-info .profile-name {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .profile-info .profile-title {
            font-size: 17px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .profile-info .profile-dept {
            font-size: 15px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .profile-info .profile-joined {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .profile-info .profile-joined .ph { font-size: 16px; }

        .profile-tokens {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: #fff;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
            margin-top: 10px;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.25);
        }

        .profile-tokens .ph { font-size: 20px; color: #fbbf24; }

        .profile-divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0 24px;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .stat-item {
            text-align: center;
            padding: 12px 8px;
            border-radius: var(--radius-sm);
            background: var(--surface-2);
            transition: all var(--transition);
        }

        .stat-item:hover {
            background: var(--border);
            transform: translateY(-2px);
        }

        .stat-item .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .stat-item .stat-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-top: 2px;
        }

        @media (max-width: 900px) {
            .top-header { padding: 0 20px; }
            .page-content { padding: 24px 20px 36px; }
            .top-header .brand-mobile { display: block; }
            .top-header .left-section .brand-text { display: none; }
            .top-header .user-name { display: none; }
            .top-header .search-wrap { max-width: 300px; }
            .profile-card { padding: 24px 24px 28px; }
            .profile-avatar-large { width: 80px; height: 80px; font-size: 28px; }
            .profile-info .profile-name { font-size: 22px; }
            .profile-stats { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }

        @media (max-width: 640px) {
            :root { --sidebar-width: 280px; }
            .top-header { padding: 0 14px; height: 64px; gap: 12px; }
            .top-header .search-wrap { max-width: 180px; }
            .top-header .search-wrap input { padding: 8px 12px 8px 40px; font-size: 14px; }
            .top-header .search-wrap .ph { font-size: 18px; left: 12px; }
            .top-header .hamburger-btn { font-size: 24px; padding: 4px; }
            .top-header .profile-image-wrap { width: 34px; height: 34px; }
            .page-content { padding: 18px 14px 32px; }
            .profile-header h1 { font-size: 24px; }
            .profile-card { padding: 20px 16px 24px; }
            .profile-top { flex-direction: column; align-items: center; text-align: center; gap: 16px; }
            .profile-avatar-large { width: 72px; height: 72px; font-size: 24px; }
            .profile-info .profile-name { font-size: 20px; }
            .profile-info .profile-title { font-size: 15px; }
            .profile-tokens { font-size: 16px; padding: 6px 16px; }
            .profile-stats { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .stat-item .stat-number { font-size: 22px; }
            .stat-item .stat-label { font-size: 11px; }
            .main-content { margin-left: 0 !important; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-backdrop.visible { opacity: 1; visibility: visible; }
            .top-header .brand-mobile { display: block; }
        }

        @media (max-width: 400px) {
            .top-header .search-wrap { max-width: 120px; }
            .top-header .search-wrap input { font-size: 13px; padding: 6px 10px 6px 34px; }
            .top-header .search-wrap .ph { font-size: 16px; left: 10px; }
            .profile-stats { grid-template-columns: 1fr 1fr; gap: 8px; }
        }
    </style>
</head>

<body>

    <div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true"></div>

    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
        <div class="sidebar-header">
            <div class="brand-icon">
                <img src="../Images/logo.png" alt="ProntoX Logo" />
            </div>
            <span class="brand-text">ProntoX</span>
        </div>

        <nav class="sidebar-nav">
            <button class="nav-item" data-nav="dashboard">
                <i class="ph ph-house" aria-hidden="true"></i>
                <span class="label">Dashboard</span>
            </button>

            <button class="nav-item" data-nav="ideas">
                <i class="ph ph-lightbulb" aria-hidden="true"></i>
                <span class="label">Ideas</span>
            </button>

            <button class="nav-item" data-nav="leaderboard">
                <i class="ph ph-trophy" aria-hidden="true"></i>
                <span class="label">Leaderboard</span>
            </button>

            <button class="nav-item" data-nav="rewards">
                <i class="ph ph-gift" aria-hidden="true"></i>
                <span class="label">Rewards</span>
            </button>

            <div class="sidebar-divider" role="separator"></div>

            <button class="nav-item active" data-nav="profile" aria-current="page">
                <i class="ph ph-user" aria-hidden="true"></i>
                <span class="label">Profile</span>
            </button>

            <button class="nav-item" data-nav="settings">
                <i class="ph ph-gear" aria-hidden="true"></i>
                <span class="label">Settings</span>
            </button>

            <button class="nav-item logout" data-nav="logout">
                <i class="ph ph-sign-out" aria-hidden="true"></i>
                <span class="label">Log out</span>
            </button>
        </nav>
    </aside>

    <div class="main-content" id="mainContent" role="main">

        <header class="top-header" role="banner">
            <div class="left-section">
                <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle sidebar" aria-expanded="true">
                    <i class="ph ph-list" id="hamburgerIcon" aria-hidden="true"></i>
                </button>
                <span class="brand-mobile">ProntoX</span>
            </div>

            <div class="search-wrap" role="search">
                <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
                <input type="text" placeholder="Search..." id="searchInput" aria-label="Search" />
            </div>

            <div class="right-section">
                <div class="profile-image-wrap" id="profileImageWrap" title="Go to Profile">
                    <img src="../Images/profile-placeholder.png" alt="Profile" id="profileImage" />
                </div>
                <span class="user-name">John Doe</span>
            </div>
        </header>

        <div class="page-content">

            <div class="profile-header">
                <h1>Profile</h1>
            </div>

            <div class="profile-card">

                <div class="profile-top">
                    <div class="profile-avatar-large" aria-hidden="true">AJ</div>

                    <div class="profile-info">
                        <div class="profile-name">Alex Johnson</div>
                        <div class="profile-title">Innovation Lead</div>
                        <div class="profile-dept">Digital Transformation</div>
                        <div class="profile-joined">
                            <i class="ph ph-calendar" aria-hidden="true"></i>
                            Joined Aug 2024
                        </div>
                        <div class="profile-tokens">
                            <i class="ph ph-coins" aria-hidden="true"></i>
                            120 Token Points
                        </div>
                    </div>
                </div>

                <div class="profile-divider"></div>

                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-number">0</div>
                        <div class="stat-label">IDEAS</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">0</div>
                        <div class="stat-label">VOTES</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">0</div>
                        <div class="stat-label">TEAM</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">0</div>
                        <div class="stat-label">REDEEMED</div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebarBackdrop');
            const hamburgerBtn = document.getElementById('hamburgerBtn');
            const hamburgerIcon = document.getElementById('hamburgerIcon');
            const mainContent = document.getElementById('mainContent');
            const searchInput = document.getElementById('searchInput');
            const navItems = document.querySelectorAll('.nav-item');
            const profileImageWrap = document.getElementById('profileImageWrap');

            let isSidebarOpen = true;
            let isMobile = window.innerWidth <= 640;

            function checkMobile() {
                isMobile = window.innerWidth <= 640;
                return isMobile;
            }

            function toggleSidebar(forceState) {
                const open = (typeof forceState === 'boolean') ? forceState : !isSidebarOpen;
                if (isMobile) {
                    if (open) {
                        sidebar.classList.add('open');
                        backdrop.classList.add('visible');
                        hamburgerBtn.setAttribute('aria-expanded', 'true');
                        hamburgerIcon.className = 'ph ph-x';
                    } else {
                        sidebar.classList.remove('open');
                        backdrop.classList.remove('visible');
                        hamburgerBtn.setAttribute('aria-expanded', 'false');
                        hamburgerIcon.className = 'ph ph-list';
                    }
                    isSidebarOpen = open;
                } else {
                    if (open) {
                        sidebar.classList.remove('collapsed');
                        mainContent.classList.remove('expanded');
                        hamburgerBtn.setAttribute('aria-expanded', 'true');
                        hamburgerIcon.className = 'ph ph-x';
                    } else {
                        sidebar.classList.add('collapsed');
                        mainContent.classList.add('expanded');
                        hamburgerBtn.setAttribute('aria-expanded', 'false');
                        hamburgerIcon.className = 'ph ph-list';
                    }
                    isSidebarOpen = open;
                }
            }

            function closeSidebarMobile() {
                if (isMobile) toggleSidebar(false);
            }

            navItems.forEach(function(item) {
                item.addEventListener('click', function(e) {
                    navItems.forEach(function(nav) {
                        nav.classList.remove('active');
                        nav.removeAttribute('aria-current');
                    });
                    this.classList.add('active');
                    this.setAttribute('aria-current', 'page');

                    const nav = this.dataset.nav;

                    if (nav === 'logout') {
                        e.preventDefault();
                        window.location.href = 'index.html';
                        return;
                    }

                    if (nav === 'dashboard') {
                        window.location.href = 'dashboard.html';
                        return;
                    }
                    if (nav === 'ideas') {
                        window.location.href = 'ideas.html';
                        return;
                    }
                    if (nav === 'leaderboard') {
                        window.location.href = 'leaderboard.html';
                        return;
                    }
                    if (nav === 'rewards') {
                        window.location.href = 'rewards.html';
                        return;
                    }
                    if (nav === 'settings') {
                        window.location.href = 'settings.html';
                        return;
                    }
                    if (nav === 'profile') {
                        closeSidebarMobile();
                        return;
                    }

                    closeSidebarMobile();
                });
            });

            profileImageWrap.addEventListener('click', function() {
                window.location.href = 'profile.html';
            });

            hamburgerBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleSidebar();
            });

            backdrop.addEventListener('click', function() {
                if (isMobile) toggleSidebar(false);
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (isMobile && isSidebarOpen) toggleSidebar(false);
                    if (document.activeElement === searchInput) searchInput.blur();
                }
            });

            searchInput.addEventListener('focus', function() {
                this.closest('.search-wrap').classList.add('focused');
            });
            searchInput.addEventListener('blur', function() {
                this.closest('.search-wrap').classList.remove('focused');
            });

            function applyDarkMode() {
                const darkMode = localStorage.getItem('prontox-dark-mode');
                if (darkMode === 'true') {
                    document.body.classList.add('dark-mode');
                }
            }

            let resizeTimer;

            function handleResize() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    const wasMobile = isMobile;
                    const nowMobile = checkMobile();

                    if (nowMobile && !wasMobile) {
                        if (isSidebarOpen) {
                            sidebar.classList.remove('collapsed');
                            mainContent.classList.remove('expanded');
                            toggleSidebar(false);
                        } else {
                            toggleSidebar(false);
                        }
                    } else if (!nowMobile && wasMobile) {
                        if (sidebar.classList.contains('open')) {
                            sidebar.classList.remove('open');
                            backdrop.classList.remove('visible');
                            toggleSidebar(true);
                        } else {
                            toggleSidebar(false);
                        }
                    }

                    if (!nowMobile) {
                        if (isSidebarOpen) {
                            sidebar.classList.remove('collapsed');
                            mainContent.classList.remove('expanded');
                            hamburgerBtn.setAttribute('aria-expanded', 'true');
                            hamburgerIcon.className = 'ph ph-x';
                        } else {
                            sidebar.classList.add('collapsed');
                            mainContent.classList.add('expanded');
                            hamburgerBtn.setAttribute('aria-expanded', 'false');
                            hamburgerIcon.className = 'ph ph-list';
                        }
                        sidebar.classList.remove('open');
                        backdrop.classList.remove('visible');
                    }
                }, 120);
            }

            window.addEventListener('resize', handleResize);

            function init() {
                checkMobile();
                if (isMobile) toggleSidebar(false);
                else toggleSidebar(true);
                applyDarkMode();
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
