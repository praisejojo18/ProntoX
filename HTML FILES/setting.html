<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProntoX · Settings</title>

    <!-- Phosphor Icons -->
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />

    <style>
        /* ============================================================
                   GLOBAL RESET & BASE (shared with dashboard)
                   ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sidebar-bg: #172554;
            --sidebar-active: #93c5fd;
            --sidebar-active-bg: rgba(96, 165, 250, 0.15);
            --sidebar-hover-bg: rgba(147, 197, 253, 0.06);
            --sidebar-divider: rgba(147, 197, 253, 0.12);
            --sidebar-text: #b0aec8;

            --header-bg: #ffffff;
            --header-border: #edf2f7;
            --body-bg: #f6f8fc;
            --card-bg: #ffffff;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            --card-shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.08);

            --text-primary: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-muted: #8e8ea8;

            --radius: 14px;
            --radius-sm: 10px;
            --radius-xs: 8px;

            --transition: 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-sidebar: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);

            --sidebar-width: 260px;

            /* toggle colors */
            --toggle-bg: #cbd5e1;
            --toggle-active: #3b82f6;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--body-bg);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        :focus-visible {
            outline: 2px solid var(--sidebar-active);
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* ============================================================
                   SIDEBAR (identical on all pages)
                   ============================================================ */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 0 16px 24px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 1000;
            transition: transform var(--transition-sidebar), width var(--transition-sidebar);
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.08) transparent;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 4px;
        }

        .sidebar.collapsed {
            transform: translateX(calc(-1 * var(--sidebar-width)));
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 22px 12px 28px 12px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--sidebar-divider);
            margin-bottom: 16px;
        }

        .sidebar-header .brand-icon {
            width: 36px;
            height: 36px;
            background: #1e3a8a;
            border-radius: var(--radius-xs);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #bfdbfe;
            font-weight: 700;
            font-size: 18px;
            flex-shrink: 0;
        }

        .sidebar-header .brand-text {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.3px;
            white-space: nowrap;
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 4px 0;
        }

        .sidebar-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            color: var(--sidebar-text);
            font-size: 15px;
            font-weight: 500;
            transition: background var(--transition), color var(--transition);
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            position: relative;
            white-space: nowrap;
        }

        .sidebar-nav .nav-item .ph {
            font-size: 22px;
            flex-shrink: 0;
            width: 24px;
            text-align: center;
        }

        .sidebar-nav .nav-item:hover {
            background: var(--sidebar-hover-bg);
            color: #ffffff;
        }

        .sidebar-nav .nav-item.active {
            background: var(--sidebar-active-bg);
            color: var(--sidebar-active);
            font-weight: 600;
        }

        .sidebar-nav .nav-item.active .ph {
            color: var(--sidebar-active);
        }

        .sidebar-divider {
            height: 1px;
            background: var(--sidebar-divider);
            margin: 10px 14px 12px;
            flex-shrink: 0;
        }

        .sidebar-nav .nav-item.logout {
            margin-top: auto;
            color: #f87171;
        }

        .sidebar-nav .nav-item.logout:hover {
            background: rgba(248, 113, 113, 0.08);
            color: #fca5a5;
        }

        /* ============================================================
                   BACKDROP (mobile)
                   ============================================================ */
        .sidebar-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s ease;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        .sidebar-backdrop.visible {
            opacity: 1;
            visibility: visible;
        }

        /* ============================================================
                   MAIN CONTENT
                   ============================================================ */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin-left var(--transition-sidebar);
        }

        .main-content.expanded {
            margin-left: 0;
        }

        /* ============================================================
                   TOP HEADER
                   ============================================================ */
        .top-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--header-bg);
            border-bottom: 1px solid var(--header-border);
            padding: 0 32px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-shrink: 0;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.92);
        }

        .top-header .left-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .top-header .hamburger-btn {
            background: transparent;
            border: none;
            font-size: 28px;
            color: var(--text-primary);
            cursor: pointer;
            padding: 6px;
            border-radius: var(--radius-xs);
            transition: background var(--transition), transform var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .top-header .hamburger-btn:hover {
            background: rgba(0, 0, 0, 0.04);
        }
        .top-header .hamburger-btn:active {
            transform: scale(0.92);
        }

        .top-header .brand-mobile {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            display: none;
            letter-spacing: -0.3px;
        }

        .top-header .search-wrap {
            flex: 1;
            max-width: 460px;
            position: relative;
        }

        .top-header .search-wrap .ph {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: var(--text-muted);
            transition: color var(--transition);
            pointer-events: none;
        }

        .top-header .search-wrap input {
            width: 100%;
            padding: 10px 16px 10px 48px;
            border: 1.5px solid #e2e8f0;
            border-radius: 50px;
            font-size: 15px;
            background: #f7fafc;
            color: var(--text-primary);
            transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
            outline: none;
            font-weight: 450;
        }

        .top-header .search-wrap input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        .top-header .search-wrap input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
            background: #ffffff;
        }

        .top-header .search-wrap input:focus~.ph {
            color: #3b82f6;
        }

        .top-header .right-section {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .top-header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
            user-select: none;
        }

        .top-header .user-name {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
        }

        /* ============================================================
                   PAGE CONTENT – SETTINGS
                   ============================================================ */
        .page-content {
            padding: 32px 40px 48px;
            flex: 1;
        }

        .settings-header {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 28px;
        }

        .settings-header h1 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        /* ============================================================
                   SETTINGS CARD
                   ============================================================ */
        .settings-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            padding: 32px 36px 36px;
            border: 1px solid rgba(0, 0, 0, 0.02);
            transition: box-shadow var(--transition), transform var(--transition);
            max-width: 640px;
        }

        .settings-card:hover {
            box-shadow: var(--card-shadow-hover);
            transform: translateY(-2px);
        }

        .settings-card .form-group {
            margin-bottom: 24px;
        }

        .settings-card .form-group:last-of-type {
            margin-bottom: 28px;
        }

        .settings-card label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 6px;
        }

        .settings-card .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: var(--radius-sm);
            font-size: 16px;
            color: var(--text-primary);
            background: #fafbfc;
            transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
            outline: none;
        }

        .settings-card .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.10);
            background: #ffffff;
        }

        .settings-card .form-control::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Toggle row */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            padding: 8px 0 4px;
        }

        .toggle-row .toggle-label {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .toggle-row .toggle-desc {
            font-size: 14px;
            color: var(--text-muted);
            flex-basis: 100%;
            margin-top: 2px;
        }

        /* Toggle switch */
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            user-select: none;
        }

        .toggle-switch input {
            display: none;
        }

        .toggle-slider {
            width: 48px;
            height: 26px;
            background: var(--toggle-bg);
            border-radius: 50px;
            position: relative;
            transition: background var(--transition);
            flex-shrink: 0;
        }

        .toggle-slider::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: #ffffff;
            border-radius: 50%;
            transition: transform var(--transition);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        .toggle-switch input:checked+.toggle-slider {
            background: var(--toggle-active);
        }

        .toggle-switch input:checked+.toggle-slider::after {
            transform: translateX(22px);
        }

        .toggle-status {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            min-width: 36px;
        }

        .toggle-switch input:checked~.toggle-status {
            color: var(--toggle-active);
            font-weight: 600;
        }

        /* Save button */
        .save-btn {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: #fff;
            border: none;
            padding: 12px 36px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform var(--transition), box-shadow var(--transition);
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(37, 99, 235, 0.4);
        }

        .save-btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 10px rgba(37, 99, 235, 0.25);
        }

        .save-btn .ph {
            font-size: 18px;
        }

        /* ============================================================
                   RESPONSIVE
                   ============================================================ */
        @media (max-width: 900px) {
            .top-header {
                padding: 0 20px;
            }
            .page-content {
                padding: 24px 20px 36px;
            }
            .top-header .brand-mobile {
                display: block;
            }
            .top-header .left-section .brand-text {
                display: none;
            }
            .top-header .user-name {
                display: none;
            }
            .top-header .search-wrap {
                max-width: 300px;
            }
            .settings-card {
                padding: 24px 24px 28px;
            }
        }

        @media (max-width: 640px) {
            :root {
                --sidebar-width: 280px;
            }
            .top-header {
                padding: 0 14px;
                height: 64px;
                gap: 12px;
            }
            .top-header .search-wrap {
                max-width: 180px;
            }
            .top-header .search-wrap input {
                padding: 8px 12px 8px 40px;
                font-size: 14px;
            }
            .top-header .search-wrap .ph {
                font-size: 18px;
                left: 12px;
            }
            .top-header .hamburger-btn {
                font-size: 24px;
                padding: 4px;
            }
            .top-header .avatar {
                width: 34px;
                height: 34px;
                font-size: 14px;
            }
            .page-content {
                padding: 18px 14px 32px;
            }
            .settings-header h1 {
                font-size: 24px;
            }
            .settings-card {
                padding: 20px 16px 24px;
            }
            .settings-card .form-control {
                font-size: 15px;
                padding: 10px 14px;
            }
            .toggle-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }
            .toggle-switch {
                margin-top: 4px;
            }
            .save-btn {
                width: 100%;
                justify-content: center;
                padding: 14px;
            }
            .main-content {
                margin-left: 0 !important;
            }
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-backdrop.visible {
                opacity: 1;
                visibility: visible;
            }
            .top-header .brand-mobile {
                display: block;
            }
        }

        @media (max-width: 400px) {
            .top-header .search-wrap {
                max-width: 120px;
            }
            .top-header .search-wrap input {
                font-size: 13px;
                padding: 6px 10px 6px 34px;
            }
            .top-header .search-wrap .ph {
                font-size: 16px;
                left: 10px;
            }
        }
    </style>
</head>

<body>

    <!-- ============================================================
    SIDEBAR BACKDROP (mobile)
    ============================================================ -->
    <div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true"></div>

    <!-- ============================================================
    SIDEBAR
    ============================================================ -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
        <div class="sidebar-header">
            <div class="brand-icon" aria-hidden="true">P</div>
            <span class="brand-text">ProntoX</span>
        </div>

        <nav class="sidebar-nav">
            <!-- Dashboard -->
            <button class="nav-item" data-nav="dashboard">
                <i class="ph ph-house" aria-hidden="true"></i>
                <span class="label">Dashboard</span>
            </button>

            <!-- Ideas -->
            <button class="nav-item" data-nav="ideas">
                <i class="ph ph-lightbulb" aria-hidden="true"></i>
                <span class="label">Ideas</span>
            </button>

            <!-- Leaderboard -->
            <button class="nav-item" data-nav="leaderboard">
                <i class="ph ph-trophy" aria-hidden="true"></i>
                <span class="label">Leaderboard</span>
            </button>

            <!-- Rewards -->
            <button class="nav-item" data-nav="rewards">
                <i class="ph ph-gift" aria-hidden="true"></i>
                <span class="label">Rewards</span>
            </button>

            <!-- Builders Hub -->
            <button class="nav-item" data-nav="builders">
                <i class="ph ph-users" aria-hidden="true"></i>
                <span class="label">Builders Hub</span>
            </button>

            <div class="sidebar-divider" role="separator"></div>

            <!-- Profile -->
            <button class="nav-item" data-nav="profile">
                <i class="ph ph-user" aria-hidden="true"></i>
                <span class="label">Profile</span>
            </button>

            <!-- Settings (active) -->
            <button class="nav-item active" data-nav="settings" aria-current="page">
                <i class="ph ph-gear" aria-hidden="true"></i>
                <span class="label">Settings</span>
            </button>

            <!-- Logout -->
            <button class="nav-item logout" data-nav="logout">
                <i class="ph ph-sign-out" aria-hidden="true"></i>
                <span class="label">Log out</span>
            </button>
        </nav>
    </aside>

    <!-- ============================================================
    MAIN CONTENT
    ============================================================ -->
    <div class="main-content" id="mainContent" role="main">

        <!-- ============================================================
        TOP HEADER
        ============================================================ -->
        <header class="top-header" role="banner">
            <div class="left-section">
                <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle sidebar" aria-expanded="true">
                    <i class="ph ph-list" aria-hidden="true"></i>
                </button>
                <span class="brand-mobile">ProntoX</span>
            </div>

            <div class="search-wrap" role="search">
                <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
                <input type="text" placeholder="Search settings..." id="searchInput" aria-label="Search settings" />
            </div>

            <div class="right-section">
                <div class="avatar" aria-hidden="true">JD</div>
                <span class="user-name">John Doe</span>
            </div>
        </header>

        <!-- ============================================================
        PAGE CONTENT – SETTINGS
        ============================================================ -->
        <div class="page-content">

            <div class="settings-header">
                <h1>Settings</h1>
            </div>

            <!-- Settings Card -->
            <div class="settings-card">
                <form id="settingsForm" autocomplete="off">

                    <!-- Full Name -->
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" class="form-control" value="Michael Saturn" placeholder="Enter your full name" />
                    </div>

                    <!-- Role / Title -->
                    <div class="form-group">
                        <label for="role">Role / Title</label>
                        <input type="text" id="role" class="form-control" value="Network Engineer" placeholder="Enter your role" />
                    </div>

                    <!-- Department -->
                    <div class="form-group">
                        <label for="department">Department</label>
                        <input type="text" id="department" class="form-control" value="Core Network Performance" placeholder="Enter your department" />
                    </div>

                    <!-- Theme Preference (Toggle) -->
                    <div class="form-group">
                        <label>Theme Preference</label>
                        <div class="toggle-row">
                            <div>
                                <div class="toggle-label">Dark Mode <span style="font-weight:400;color:var(--text-muted);">(off)</span></div>
                                <div class="toggle-desc">Toggle between light and dark interface.</div>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="darkModeToggle" />
                                <span class="toggle-slider"></span>
                                <span class="toggle-status" id="toggleStatus">Off</span>
                            </label>
                        </div>
                    </div>

                    <!-- Save Button -->
                    <button type="submit" class="save-btn" id="saveSettingsBtn">
                        <i class="ph ph-floppy-disk" aria-hidden="true"></i>
                        Save Settings
                    </button>

                </form>
            </div>

        </div><!-- /page-content -->
    </div><!-- /main-content -->


    <!-- ============================================================
    JAVASCRIPT
    ============================================================ -->
    <script>
        (function() {
            'use strict';

            // ------------------------------------------------------------
            // DOM refs
            // ------------------------------------------------------------
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebarBackdrop');
            const hamburgerBtn = document.getElementById('hamburgerBtn');
            const mainContent = document.getElementById('mainContent');
            const searchInput = document.getElementById('searchInput');
            const navItems = document.querySelectorAll('.nav-item');

            const darkModeToggle = document.getElementById('darkModeToggle');
            const toggleStatus = document.getElementById('toggleStatus');
            const saveBtn = document.getElementById('saveSettingsBtn');
            const settingsForm = document.getElementById('settingsForm');

            // ------------------------------------------------------------
            // STATE
            // ------------------------------------------------------------
            let isSidebarOpen = true;
            let isMobile = window.innerWidth <= 640;

            // ------------------------------------------------------------
            // HELPER: detect mobile
            // ------------------------------------------------------------
            function checkMobile() {
                isMobile = window.innerWidth <= 640;
                return isMobile;
            }

            // ------------------------------------------------------------
            // SIDEBAR TOGGLE
            // ------------------------------------------------------------
            function toggleSidebar(forceState) {
                const open = (typeof forceState === 'boolean') ? forceState : !isSidebarOpen;
                if (isMobile) {
                    if (open) {
                        sidebar.classList.add('open');
                        backdrop.classList.add('visible');
                        hamburgerBtn.setAttribute('aria-expanded', 'true');
                    } else {
                        sidebar.classList.remove('open');
                        backdrop.classList.remove('visible');
                        hamburgerBtn.setAttribute('aria-expanded', 'false');
                    }
                    isSidebarOpen = open;
                } else {
                    if (open) {
                        sidebar.classList.remove('collapsed');
                        mainContent.classList.remove('expanded');
                        hamburgerBtn.setAttribute('aria-expanded', 'true');
                    } else {
                        sidebar.classList.add('collapsed');
                        mainContent.classList.add('expanded');
                        hamburgerBtn.setAttribute('aria-expanded', 'false');
                    }
                    isSidebarOpen = open;
                }
            }

            // ------------------------------------------------------------
            // CLOSE SIDEBAR (mobile)
            // ------------------------------------------------------------
            function closeSidebarMobile() {
                if (isMobile) toggleSidebar(false);
            }

            // ------------------------------------------------------------
            // SIDEBAR NAVIGATION (identical on all pages)
            // ------------------------------------------------------------
            navItems.forEach(function(item) {
                item.addEventListener('click', function(e) {
                    navItems.forEach(function(nav) {
                        nav.classList.remove('active');
                        nav.removeAttribute('aria-current');
                    });
                    this.classList.add('active');
                    this.setAttribute('aria-current', 'page');

                    const nav = this.dataset.nav;

                    if (nav === 'logout') {
                        e.preventDefault();
                        const label = this.querySelector('.label');
                        if (label) {
                            const original = label.textContent;
                            label.textContent = 'Logging out…';
                            setTimeout(function() {
                                label.textContent = original;
                            }, 800);
                        }
                        closeSidebarMobile();
                        return;
                    }

                    // Navigation rules
                    if (nav === 'dashboard') {
                        window.location.href = 'dashboard.html';
                        return;
                    }
                    if (nav === 'ideas') {
                        window.location.href = 'ideas.html';
                        return;
                    }
                    if (nav === 'leaderboard') {
                        window.location.href = 'leaderboard.html';
                        return;
                    }
                    if (nav === 'rewards') {
                        window.location.href = 'rewards.html';
                        return;
                    }
                    if (nav === 'builders') {
                        window.location.href = 'builders.html';
                        return;
                    }
                    if (nav === 'profile') {
                        window.location.href = 'profile.html';
                        return;
                    }
                    if (nav === 'settings') {
                        // Already on settings, just close mobile sidebar
                        closeSidebarMobile();
                        return;
                    }

                    closeSidebarMobile();
                });
            });

            // ------------------------------------------------------------
            // HAMBURGER
            // ------------------------------------------------------------
            hamburgerBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleSidebar();
            });

            // ------------------------------------------------------------
            // BACKDROP
            // ------------------------------------------------------------
            backdrop.addEventListener('click', function() {
                if (isMobile) toggleSidebar(false);
            });

            // ------------------------------------------------------------
            // ESC KEY
            // ------------------------------------------------------------
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (isMobile && isSidebarOpen) toggleSidebar(false);
                    if (document.activeElement === searchInput) searchInput.blur();
                }
            });

            // ------------------------------------------------------------
            // SEARCH FOCUS
            // ------------------------------------------------------------
            searchInput.addEventListener('focus', function() {
                this.closest('.search-wrap').classList.add('focused');
            });
            searchInput.addEventListener('blur', function() {
                this.closest('.search-wrap').classList.remove('focused');
            });

            // ------------------------------------------------------------
            // DARK MODE TOGGLE
            // ------------------------------------------------------------
            darkModeToggle.addEventListener('change', function() {
                const isChecked = this.checked;
                toggleStatus.textContent = isChecked ? 'On' : 'Off';
                // For demo, you could apply a class to body, but we just show status.
                // Optionally change the toggle description color:
                const desc = document.querySelector('.toggle-desc');
                if (desc) {
                    desc.style.color = isChecked ? 'var(--toggle-active)' : 'var(--text-muted)';
                }
            });

            // ------------------------------------------------------------
            // SAVE SETTINGS
            // ------------------------------------------------------------
            settingsForm.addEventListener('submit', function(e) {
                e.preventDefault();

                // Collect values
                const fullName = document.getElementById('fullName').value.trim() || 'Michael Saturn';
                const role = document.getElementById('role').value.trim() || 'Network Engineer';
                const department = document.getElementById('department').value.trim() || 'Core Network Performance';
                const darkMode = darkModeToggle.checked ? 'On' : 'Off';

                // Simulate saving
                saveBtn.innerHTML = '<i class="ph ph-check-circle" aria-hidden="true"></i> Saved!';
                saveBtn.style.background = 'linear-gradient(135deg, #059669, #047857)';
                saveBtn.style.boxShadow = '0 4px 14px rgba(5, 150, 105, 0.4)';

                console.log('Settings saved:', { fullName, role, department, darkMode });

                setTimeout(function() {
                    saveBtn.innerHTML = '<i class="ph ph-floppy-disk" aria-hidden="true"></i> Save Settings';
                    saveBtn.style.background = '';
                    saveBtn.style.boxShadow = '';
                }, 2500);
            });

            // ------------------------------------------------------------
            // WINDOW RESIZE
            // ------------------------------------------------------------
            let resizeTimer;

            function handleResize() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    const wasMobile = isMobile;
                    const nowMobile = checkMobile();

                    if (nowMobile && !wasMobile) {
                        if (isSidebarOpen) {
                            sidebar.classList.remove('collapsed');
                            mainContent.classList.remove('expanded');
                            toggleSidebar(false);
                        } else {
                            toggleSidebar(false);
                        }
                    } else if (!nowMobile && wasMobile) {
                        if (sidebar.classList.contains('open')) {
                            sidebar.classList.remove('open');
                            backdrop.classList.remove('visible');
                            toggleSidebar(true);
                        } else {
                            toggleSidebar(false);
                        }
                    }

                    if (!nowMobile) {
                        if (isSidebarOpen) {
                            sidebar.classList.remove('collapsed');
                            mainContent.classList.remove('expanded');
                            hamburgerBtn.setAttribute('aria-expanded', 'true');
                        } else {
                            sidebar.classList.add('collapsed');
                            mainContent.classList.add('expanded');
                            hamburgerBtn.setAttribute('aria-expanded', 'false');
                        }
                        sidebar.classList.remove('open');
                        backdrop.classList.remove('visible');
                    }
                }, 120);
            }

            window.addEventListener('resize', handleResize);

            // ------------------------------------------------------------
            // INIT
            // ------------------------------------------------------------
            function init() {
                checkMobile();
                if (isMobile) toggleSidebar(false);
                else toggleSidebar(true);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
