<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProntoX · Settings</title>

    <!-- Phosphor Icons -->
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />

    <style>
        /* ============================================================
           GLOBAL RESET & BASE (same as dashboard)
           ============================================================ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #F0F4F8;
            --surface: #FFFFFF;
            --surface-2: #F8FAFC;
            --text-primary: #1A2332;
            --text-secondary: #475569;
            --text-muted: #94A3B8;
            --border: #E2E8F0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.08);

            --accent: #00AFEF;
            --accent-hover: #0099D3;
            --accent-dark: #0088CC;
            --accent-light: #E6F6FE;
            --accent-mid: #B3E5FC;

            /* ====== SIDEBAR VARIABLES (matching dashboard) ====== */
            --sidebar-bg: #FFFFFF;
            --sidebar-text: var(--text-primary);
            --sidebar-active: var(--accent);
            --sidebar-active-bg: var(--accent-light);
            --sidebar-hover-bg: rgba(0, 175, 239, 0.06);
            --sidebar-divider: var(--border);
            --sidebar-text-muted: var(--text-muted);

            --bg-dark: #0E0F11;
            --surface-dark: #1A1E21;
            --surface-2-dark: #24292E;
            --text-primary-dark: #E7E9EB;
            --text-secondary-dark: #AAB0B6;
            --text-muted-dark: #888E99;
            --border-dark: #353E46;
            --accent-dark-mode: #60A5FA;
            --accent-light-dark: #1a3a5a;

            --radius: 14px;
            --radius-sm: 10px;
            --radius-xs: 8px;
            --transition: 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-sidebar: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --sidebar-width: 260px;

            --toggle-bg: #cbd5e1;
            --toggle-active: #00AFEF;
        }

        body.dark-mode {
            --bg: var(--bg-dark);
            --surface: var(--surface-dark);
            --surface-2: var(--surface-2-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
            --text-muted: var(--text-muted-dark);
            --border: var(--border-dark);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.4);
            --accent: var(--accent-dark-mode);
            --accent-light: var(--accent-light-dark);
            --accent-mid: #1a4a5a;

            /* ====== SIDEBAR DARK OVERRIDES (matching dashboard) ====== */
            --sidebar-bg: #1A1E21;
            --sidebar-divider: #353E46;
            --sidebar-active: var(--accent-dark-mode);
            --sidebar-active-bg: var(--accent-light-dark);
            --sidebar-hover-bg: rgba(59, 130, 246, 0.06);
            --sidebar-text-muted: #888E99;

            --toggle-bg: #353E46;
            --toggle-active: #00AFEF;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background var(--transition), color var(--transition);
        }

        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* ============================================================
           SIDEBAR (improved – matching dashboard)
           ============================================================ */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 0 16px 24px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 1000;
            transition: background var(--transition), transform var(--transition-sidebar),
                        width var(--transition-sidebar), color var(--transition);
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 0, 0, 0.08) transparent;
            border-right: 1px solid var(--sidebar-divider);
        }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.12); border-radius: 4px; }
        body.dark-mode .sidebar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); }

        .sidebar.collapsed {
            transform: translateX(calc(-1 * var(--sidebar-width)));
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 22px 12px 28px 12px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--sidebar-divider);
            margin-bottom: 16px;
        }

        .sidebar-header .brand-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-xs);
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-light);
            box-shadow: 0 4px 14px rgba(0, 175, 239, 0.15);
            transition: background var(--transition);
        }
        .sidebar-header .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .sidebar-header .brand-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
            white-space: nowrap;
            transition: color var(--transition);
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 4px 0;
        }

        .sidebar-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            color: var(--sidebar-text-muted);
            font-size: 15px;
            font-weight: 500;
            transition: all var(--transition);
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            position: relative;
            white-space: nowrap;
        }

        .sidebar-nav .nav-item .ph {
            font-size: 22px;
            flex-shrink: 0;
            width: 24px;
            text-align: center;
        }

        .sidebar-nav .nav-item:hover {
            background: var(--sidebar-hover-bg);
            color: var(--text-primary);
        }

        .sidebar-nav .nav-item.active {
            background: var(--sidebar-active-bg);
            color: var(--sidebar-active);
            font-weight: 600;
        }
        .sidebar-nav .nav-item.active .ph {
            color: var(--sidebar-active);
        }

        .sidebar-divider {
            height: 1px;
            background: var(--sidebar-divider);
            margin: 10px 14px 12px;
            flex-shrink: 0;
            transition: background var(--transition);
        }

        .sidebar-nav .nav-item.logout {
            margin-top: auto;
            color: var(--text-muted);
        }
        .sidebar-nav .nav-item.logout:hover {
            background: rgba(239, 68, 68, 0.06);
            color: #ef4444;
        }

        .sidebar-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s ease;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        .sidebar-backdrop.visible {
            opacity: 1;
            visibility: visible;
        }

        /* ============================================================
           MAIN CONTENT
           ============================================================ */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin-left var(--transition-sidebar);
        }
        .main-content.expanded {
            margin-left: 0;
        }

        /* ============================================================
           TOP HEADER – compact (60px)
           ============================================================ */
        .top-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-shrink: 0;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.92);
            transition: background var(--transition), border-color var(--transition);
        }
        body.dark-mode .top-header {
            background: rgba(26, 30, 33, 0.92);
        }

        .top-header .left-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .top-header .hamburger-btn {
            background: transparent;
            border: none;
            font-size: 28px;
            color: var(--text-primary);
            cursor: pointer;
            padding: 6px;
            border-radius: var(--radius-xs);
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .top-header .hamburger-btn:hover {
            background: rgba(0, 0, 0, 0.04);
        }
        .top-header .hamburger-btn:active {
            transform: scale(0.92);
        }
        .top-header .brand-mobile {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            display: none;
            letter-spacing: -0.3px;
        }

        .top-header .search-wrap {
            flex: 1;
            max-width: 460px;
            position: relative;
        }
        .top-header .search-wrap .ph {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: var(--text-muted);
            transition: color var(--transition);
            pointer-events: none;
        }
        .top-header .search-wrap input {
            width: 100%;
            padding: 10px 16px 10px 48px;
            border: 1.5px solid var(--border);
            border-radius: 50px;
            font-size: 15px;
            background: var(--bg);
            color: var(--text-primary);
            transition: all var(--transition);
            outline: none;
            font-weight: 450;
        }
        .top-header .search-wrap input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }
        .top-header .search-wrap input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0, 175, 239, 0.12);
            background: var(--surface);
        }
        .top-header .search-wrap input:focus ~ .ph {
            color: var(--accent);
        }

        .top-header .right-section {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .top-header .profile-image-wrap {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color var(--transition), transform var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .top-header .profile-image-wrap:hover {
            border-color: var(--accent);
            transform: scale(1.04);
        }
        .top-header .profile-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .top-header .user-name {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .dark-toggle {
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
            transition: color var(--transition), transform var(--transition);
            padding: 4px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            line-height: 1;
        }
        .dark-toggle:hover {
            color: var(--accent);
            transform: scale(1.1);
        }
        .dark-toggle:active {
            transform: scale(0.9);
        }

        /* ============================================================
           PAGE CONTENT – SETTINGS (centred)
           ============================================================ */
        .page-content {
            padding: 32px 40px 48px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .settings-header {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 28px;
            width: 100%;
            max-width: 640px;
        }

        .settings-header h1 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .settings-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px 36px 36px;
            border: 1px solid var(--border);
            transition: all var(--transition);
            max-width: 640px;
            width: 100%;
        }

        .settings-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .settings-card .form-group {
            margin-bottom: 24px;
        }
        .settings-card .form-group:last-of-type {
            margin-bottom: 28px;
        }

        .settings-card label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 6px;
        }

        .settings-card .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 16px;
            color: var(--text-primary);
            background: var(--bg);
            transition: all var(--transition);
            outline: none;
        }

        .settings-card .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0, 175, 239, 0.10);
            background: var(--surface);
        }
        .settings-card .form-control::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            padding: 8px 0 4px;
        }

        .toggle-row .toggle-label {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
        }
        .toggle-row .toggle-desc {
            font-size: 14px;
            color: var(--text-muted);
            flex-basis: 100%;
            margin-top: 2px;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            user-select: none;
        }

        .toggle-switch input {
            display: none;
        }

        .toggle-slider {
            width: 48px;
            height: 26px;
            background: var(--toggle-bg);
            border-radius: 50px;
            position: relative;
            transition: background var(--transition);
            flex-shrink: 0;
        }

        .toggle-slider::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: #ffffff;
            border-radius: 50%;
            transition: transform var(--transition);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        .toggle-switch input:checked + .toggle-slider {
            background: var(--toggle-active);
        }

        .toggle-switch input:checked + .toggle-slider::after {
            transform: translateX(22px);
        }

        .toggle-status {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            min-width: 36px;
        }

        .toggle-switch input:checked ~ .toggle-status {
            color: var(--toggle-active);
            font-weight: 600;
        }

        .save-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 36px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 4px 16px rgba(0, 175, 239, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .save-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0, 175, 239, 0.4);
        }
        .save-btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 10px rgba(0, 175, 239, 0.25);
        }
        .save-btn .ph {
            font-size: 18px;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 900px) {
            .top-header { padding: 0 20px; }
            .page-content { padding: 24px 20px 36px; }
            .top-header .brand-mobile { display: block; }
            .top-header .left-section .brand-text { display: none; }
            .top-header .user-name { display: none; }
            .top-header .search-wrap { max-width: 300px; }
            .settings-card { padding: 24px 24px 28px; }
        }

        @media (max-width: 640px) {
            :root { --sidebar-width: 280px; }
            .top-header { padding: 0 14px; height: 52px; gap: 12px; }
            .top-header .search-wrap { max-width: 180px; }
            .top-header .search-wrap input { padding: 8px 12px 8px 40px; font-size: 14px; }
            .top-header .search-wrap .ph { font-size: 18px; left: 12px; }
            .top-header .hamburger-btn { font-size: 24px; padding: 4px; }
            .top-header .profile-image-wrap { width: 34px; height: 34px; }
            .dark-toggle { font-size: 20px; }
            .page-content { padding: 18px 14px 32px; }
            .settings-header h1 { font-size: 24px; }
            .settings-card { padding: 20px 16px 24px; }
            .settings-card .form-control { font-size: 15px; padding: 10px 14px; }
            .toggle-row { flex-direction: column; align-items: flex-start; gap: 4px; }
            .toggle-switch { margin-top: 4px; }
            .save-btn { width: 100%; justify-content: center; padding: 14px; }
            .main-content { margin-left: 0 !important; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-backdrop.visible { opacity: 1; visibility: visible; }
            .top-header .brand-mobile { display: block; }
        }

        @media (max-width: 400px) {
            .top-header .search-wrap { max-width: 120px; }
            .top-header .search-wrap input { font-size: 13px; padding: 6px 10px 6px 34px; }
            .top-header .search-wrap .ph { font-size: 16px; left: 10px; }
        }
    </style>
</head>
<body>

    <!-- Sidebar backdrop -->
    <div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
        <div class="sidebar-header">
            <div class="brand-icon">
                <img src="../Images/logo.png" alt="ProntoX Logo" />
            </div>
            <span class="brand-text">ProntoX</span>
        </div>

        <nav class="sidebar-nav">
            <button class="nav-item" data-nav="dashboard">
                <i class="ph ph-house" aria-hidden="true"></i>
                <span class="label">Dashboard</span>
            </button>
            <button class="nav-item" data-nav="ideas">
                <i class="ph ph-lightbulb" aria-hidden="true"></i>
                <span class="label">Ideas</span>
            </button>
            <button class="nav-item" data-nav="leaderboard">
                <i class="ph ph-trophy" aria-hidden="true"></i>
                <span class="label">Leaderboard</span>
            </button>
            <button class="nav-item" data-nav="rewards">
                <i class="ph ph-gift" aria-hidden="true"></i>
                <span class="label">Rewards</span>
            </button>
            <div class="sidebar-divider" role="separator"></div>
            <button class="nav-item" data-nav="profile">
                <i class="ph ph-user" aria-hidden="true"></i>
                <span class="label">Profile</span>
            </button>
            <button class="nav-item active" data-nav="settings" aria-current="page">
                <i class="ph ph-gear" aria-hidden="true"></i>
                <span class="label">Settings</span>
            </button>
            <button class="nav-item logout" data-nav="logout">
                <i class="ph ph-sign-out" aria-hidden="true"></i>
                <span class="label">Log out</span>
            </button>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-content" id="mainContent" role="main">

        <!-- TOP HEADER -->
        <header class="top-header" role="banner">
            <div class="left-section">
                <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle sidebar" aria-expanded="true">
                    <i class="ph ph-list" id="hamburgerIcon" aria-hidden="true"></i>
                </button>
                <span class="brand-mobile">ProntoX</span>
            </div>

            <div class="search-wrap" role="search">
                <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
                <input type="text" placeholder="Search settings..." id="searchInput" aria-label="Search settings" />
            </div>

            <div class="right-section">
                <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode">
                    <i class="ph ph-sun" id="darkIcon"></i>
                </button>

                <div class="profile-image-wrap" id="profileImageWrap" title="Go to Profile">
                    <img src="../Images/profile-placeholder.png" alt="Profile" id="profileImage" />
                </div>
                <span class="user-name">John Doe</span>
            </div>
        </header>

        <!-- PAGE CONTENT -->
        <div class="page-content">

            <div class="settings-header">
                <h1>Settings</h1>
            </div>

            <div class="settings-card">
                <form id="settingsForm" autocomplete="off">

                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" class="form-control" value="Michael Saturn" placeholder="Enter your full name" />
                    </div>

                    <div class="form-group">
                        <label for="role">Role / Title</label>
                        <input type="text" id="role" class="form-control" value="Network Engineer" placeholder="Enter your role" />
                    </div>

                    <div class="form-group">
                        <label for="department">Department</label>
                        <input type="text" id="department" class="form-control" value="Core Network Performance" placeholder="Enter your department" />
                    </div>

                    <!-- Theme Preference (Toggle) -->
                    <div class="form-group">
                        <label>Theme Preference</label>
                        <div class="toggle-row">
                            <div>
                                <div class="toggle-label">Dark Mode <span style="font-weight:400;color:var(--text-muted);">(off)</span></div>
                                <div class="toggle-desc">Toggle between light and dark interface.</div>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="darkModeToggle" />
                                <span class="toggle-slider"></span>
                                <span class="toggle-status" id="toggleStatus">Off</span>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="save-btn" id="saveSettingsBtn">
                        <i class="ph ph-floppy-disk" aria-hidden="true"></i>
                        Save Settings
                    </button>

                </form>
            </div>

        </div><!-- /page-content -->
    </div><!-- /main-content -->

    <script>
        (function() {
            'use strict';

            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebarBackdrop');
            const hamburgerBtn = document.getElementById('hamburgerBtn');
            const hamburgerIcon = document.getElementById('hamburgerIcon');
            const mainContent = document.getElementById('mainContent');
            const searchInput = document.getElementById('searchInput');
            const navItems = document.querySelectorAll('.nav-item');
            const profileImageWrap = document.getElementById('profileImageWrap');
            const darkToggle = document.getElementById('darkToggle');
            const darkIcon = document.getElementById('darkIcon');

            const darkModeToggle = document.getElementById('darkModeToggle');
            const toggleStatus = document.getElementById('toggleStatus');
            const saveBtn = document.getElementById('saveSettingsBtn');
            const settingsForm = document.getElementById('settingsForm');

            let isSidebarOpen = true;
            let isMobile = window.innerWidth <= 640;

            function checkMobile() {
                isMobile = window.innerWidth <= 640;
                return isMobile;
            }

            function toggleSidebar(forceState) {
                const open = (typeof forceState === 'boolean') ? forceState : !isSidebarOpen;
                if (isMobile) {
                    if (open) {
                        sidebar.classList.add('open');
                        backdrop.classList.add('visible');
                        hamburgerBtn.setAttribute('aria-expanded', 'true');
                        hamburgerIcon.className = 'ph ph-x';
                    } else {
                        sidebar.classList.remove('open');
                        backdrop.classList.remove('visible');
                        hamburgerBtn.setAttribute('aria-expanded', 'false');
                        hamburgerIcon.className = 'ph ph-list';
                    }
                    isSidebarOpen = open;
                } else {
                    if (open) {
                        sidebar.classList.remove('collapsed');
                        mainContent.classList.remove('expanded');
                        hamburgerBtn.setAttribute('aria-expanded', 'true');
                        hamburgerIcon.className = 'ph ph-x';
                    } else {
                        sidebar.classList.add('collapsed');
                        mainContent.classList.add('expanded');
                        hamburgerBtn.setAttribute('aria-expanded', 'false');
                        hamburgerIcon.className = 'ph ph-list';
                    }
                    isSidebarOpen = open;
                }
            }

            function closeSidebarMobile() {
                if (isMobile) toggleSidebar(false);
            }

            navItems.forEach(function(item) {
                item.addEventListener('click', function(e) {
                    navItems.forEach(function(nav) {
                        nav.classList.remove('active');
                        nav.removeAttribute('aria-current');
                    });
                    this.classList.add('active');
                    this.setAttribute('aria-current', 'page');

                    const nav = this.dataset.nav;
                    if (nav === 'logout') {
                        e.preventDefault();
                        window.location.href = 'index.html';
                        return;
                    }
                    if (nav === 'dashboard') {
                        window.location.href = 'dashboard.html';
                        return;
                    }
                    if (nav === 'ideas') {
                        window.location.href = 'ideas.html';
                        return;
                    }
                    if (nav === 'leaderboard') {
                        window.location.href = 'leaderboard.html';
                        return;
                    }
                    if (nav === 'rewards') {
                        window.location.href = 'rewards.html';
                        return;
                    }
                    if (nav === 'profile') {
                        window.location.href = 'profile.html';
                        return;
                    }
                    if (nav === 'settings') {
                        closeSidebarMobile();
                        return;
                    }
                    closeSidebarMobile();
                });
            });

            profileImageWrap.addEventListener('click', function() {
                window.location.href = 'profile.html';
            });

            hamburgerBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleSidebar();
            });

            backdrop.addEventListener('click', function() {
                if (isMobile) toggleSidebar(false);
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (isMobile && isSidebarOpen) toggleSidebar(false);
                    if (document.activeElement === searchInput) searchInput.blur();
                }
            });

            searchInput.addEventListener('focus', function() {
                this.closest('.search-wrap').classList.add('focused');
            });
            searchInput.addEventListener('blur', function() {
                this.closest('.search-wrap').classList.remove('focused');
            });

            // Dark mode (icon only)
            function applyDarkMode() {
                const darkMode = localStorage.getItem('prontox-dark-mode');
                if (darkMode === 'true') {
                    document.body.classList.add('dark-mode');
                    darkIcon.className = 'ph ph-moon';
                    darkModeToggle.checked = true;
                    toggleStatus.textContent = 'On';
                    const desc = document.querySelector('.toggle-desc');
                    if (desc) desc.style.color = 'var(--toggle-active)';
                } else {
                    document.body.classList.remove('dark-mode');
                    darkIcon.className = 'ph ph-sun';
                    darkModeToggle.checked = false;
                    toggleStatus.textContent = 'Off';
                    const desc = document.querySelector('.toggle-desc');
                    if (desc) desc.style.color = '';
                }
            }

            darkToggle.addEventListener('click', function() {
                const isDark = document.body.classList.contains('dark-mode');
                if (isDark) {
                    document.body.classList.remove('dark-mode');
                    localStorage.setItem('prontox-dark-mode', 'false');
                    darkIcon.className = 'ph ph-sun';
                    darkModeToggle.checked = false;
                    toggleStatus.textContent = 'Off';
                    const desc = document.querySelector('.toggle-desc');
                    if (desc) desc.style.color = '';
                } else {
                    document.body.classList.add('dark-mode');
                    localStorage.setItem('prontox-dark-mode', 'true');
                    darkIcon.className = 'ph ph-moon';
                    darkModeToggle.checked = true;
                    toggleStatus.textContent = 'On';
                    const desc = document.querySelector('.toggle-desc');
                    if (desc) desc.style.color = 'var(--toggle-active)';
                }
            });

            // Also handle the toggle switch directly
            darkModeToggle.addEventListener('change', function() {
                const isChecked = this.checked;
                toggleStatus.textContent = isChecked ? 'On' : 'Off';
                const desc = document.querySelector('.toggle-desc');
                if (desc) {
                    desc.style.color = isChecked ? 'var(--toggle-active)' : '';
                }

                if (isChecked) {
                    document.body.classList.add('dark-mode');
                    localStorage.setItem('prontox-dark-mode', 'true');
                    darkIcon.className = 'ph ph-moon';
                } else {
                    document.body.classList.remove('dark-mode');
                    localStorage.setItem('prontox-dark-mode', 'false');
                    darkIcon.className = 'ph ph-sun';
                }
            });

            // Save Settings
            settingsForm.addEventListener('submit', function(e) {
                e.preventDefault();

                const fullName = document.getElementById('fullName').value.trim() || 'Michael Saturn';
                const role = document.getElementById('role').value.trim() || 'Network Engineer';
                const department = document.getElementById('department').value.trim() || 'Core Network Performance';
                const darkMode = darkModeToggle.checked ? 'On' : 'Off';

                saveBtn.innerHTML = '<i class="ph ph-check-circle" aria-hidden="true"></i> Saved!';
                saveBtn.style.background = 'linear-gradient(135deg, #059669, #047857)';
                saveBtn.style.boxShadow = '0 4px 14px rgba(5, 150, 105, 0.4)';

                console.log('Settings saved:', { fullName, role, department, darkMode });

                setTimeout(function() {
                    saveBtn.innerHTML = '<i class="ph ph-floppy-disk" aria-hidden="true"></i> Save Settings';
                    saveBtn.style.background = '';
                    saveBtn.style.boxShadow = '';
                }, 2500);
            });

            let resizeTimer;

            function handleResize() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    const wasMobile = isMobile;
                    const nowMobile = checkMobile();

                    if (nowMobile && !wasMobile) {
                        if (isSidebarOpen) {
                            sidebar.classList.remove('collapsed');
                            mainContent.classList.remove('expanded');
                            toggleSidebar(false);
                        } else {
                            toggleSidebar(false);
                        }
                    } else if (!nowMobile && wasMobile) {
                        if (sidebar.classList.contains('open')) {
                            sidebar.classList.remove('open');
                            backdrop.classList.remove('visible');
                            toggleSidebar(true);
                        } else {
                            toggleSidebar(false);
                        }
                    }

                    if (!nowMobile) {
                        if (isSidebarOpen) {
                            sidebar.classList.remove('collapsed');
                            mainContent.classList.remove('expanded');
                            hamburgerBtn.setAttribute('aria-expanded', 'true');
                            hamburgerIcon.className = 'ph ph-x';
                        } else {
                            sidebar.classList.add('collapsed');
                            mainContent.classList.add('expanded');
                            hamburgerBtn.setAttribute('aria-expanded', 'false');
                            hamburgerIcon.className = 'ph ph-list';
                        }
                        sidebar.classList.remove('open');
                        backdrop.classList.remove('visible');
                    }
                }, 120);
            }

            window.addEventListener('resize', handleResize);

            function loadAvatar() {
                const saved = localStorage.getItem('prontox-avatar');
                const headerImg = document.getElementById('profileImage');
                if (saved && headerImg) {
                    headerImg.src = saved;
                    headerImg.style.display = 'block';
                } else {
                    if (headerImg) headerImg.style.display = 'none';
                }
            }

            function init() {
                checkMobile();
                if (isMobile) toggleSidebar(false);
                else toggleSidebar(true);
                applyDarkMode();
                loadAvatar();
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
